name: 10th District Scraper

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm install axios

      - name: Run Script
        run: node "BSEB 10TH RESULT/Bseb 10th Result 2026/script.js"

      - name: Commit & Push (SAFE)
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@users.noreply.github.com"

          git add .
          git stash || true
          git pull --rebase origin main || true
          git stash pop || true

          git commit -m "Update district data" || echo "No changes"
          git push
