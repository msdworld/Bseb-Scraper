name: 10th District Scraper

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install deps
        run: npm install axios

      - name: Run scraper
        run: node "BSEB 10TH RESULT/Bseb 10th Result 2026/script.js"

      - name: Commit
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add "BSEB 10TH RESULT/Bseb 10th Result 2026/*.json"

          git commit -m "Update district data" || echo "No changes"

          git pull --rebase origin main
          git push
