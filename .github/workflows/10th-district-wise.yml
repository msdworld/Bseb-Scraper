name: Extract 10th District Data

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          lfs: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependency
        run: pip install ijson

      - name: Extract District Data (Correct Format)
        run: |
          python << 'EOF'
          import os
          import gzip
          import json
          import ijson

          MASTER_GZ = "bseb-10th-full-result-2026.json.gz"
          BASE_DIR = "BSEB 10TH RESULT/Bseb 10th Result 2026"

          # =========================
          # EDIT DISTRICTS HERE
          # =========================
          DISTRICTS = [
              ("51", "muzaffarpur"),
            ("72", "nalanda"),
            ("82", "nawadah"),
            ("11", "purnea"),
            ("74", "rohtas"),
            ("41", "saharsa"),
            ("91", "saran"),
            ("24", "sheikhpura"),
            ("56", "sheohar"),
            ("52", "sitamarhi"),
            ("92", "siwan"),
            ("42", "supaul"),
            ("53", "vaishali"),
            ("54", "west-champaran"),
          ]

          os.makedirs(BASE_DIR, exist_ok=True)

          if not os.path.exists(MASTER_GZ):
              print("❌ Master file missing")
              exit(1)

          print("📂 Streaming master file...")

          district_data = {p: {} for p, _ in DISTRICTS}
          stats = {p: {"rc": 0, "students": 0} for p, _ in DISTRICTS}

          processed = 0

          with gzip.open(MASTER_GZ, "rb") as f:
              for roll_code, value in ijson.kvitems(f, ""):
                  rc = str(roll_code)

                  for prefix, name in DISTRICTS:
                      if rc.startswith(prefix):
                          district_data[prefix][rc] = value
                          stats[prefix]["rc"] += 1
                          stats[prefix]["students"] += len(value or {})
                          break

                  processed += 1
                  if processed % 200 == 0:
                      print(f"📚 Processed: {processed}")

          # =========================
          # SAVE FUNCTION (CORRECT FORMAT)
          # =========================
          def save_json(file, data):
              roll_codes = sorted(data.keys(), key=lambda x: int(x))

              with open(file, "w", encoding="utf-8") as f:
                  f.write("{\n")

                  for rc_i, rc in enumerate(roll_codes):
                      f.write(f'  "{rc}": {{\n')

                      students = data[rc]
                      roll_nos = sorted(students.keys(), key=lambda x: int(x))

                      for rn_i, rn in enumerate(roll_nos):
                          student = students[rn].copy()

                          # 🔥 subjects single line
                          subjects = student.get("subjects", [])
                          subjects_str = json.dumps(subjects, ensure_ascii=False, separators=(",", ":"))

                          # remove subjects temporarily
                          student.pop("subjects", None)

                          # normal formatted student
                          student_json = json.dumps(student, ensure_ascii=False, indent=6)

                          lines = student_json.splitlines()

                          for i, line in enumerate(lines):
                              if i == 0:
                                  f.write(f'    "{rn}": {line}\n')
                              else:
                                  f.write(f'    {line}\n')

                          # add subjects manually (single line)
                          f.write(f'      ,"subjects": {subjects_str}\n')
                          f.write("    }")

                          if rn_i < len(roll_nos) - 1:
                              f.write(",\n")
                          else:
                              f.write("\n")

                      f.write("  }")
                      if rc_i < len(roll_codes) - 1:
                          f.write(",")
                      f.write("\n")

                  f.write("}\n")

          print("💾 Saving files...")

          for prefix, name in DISTRICTS:
              out = os.path.join(
                  BASE_DIR,
                  f"{name}-{prefix}-bseb-10th-full-result-2026.json"
              )

              save_json(out, district_data[prefix])

              print("================================")
              print(f"✅ {name}-{prefix}")
              print(f"📚 Roll Codes: {stats[prefix]['rc']}")
              print(f"🎓 Students: {stats[prefix]['students']}")

          print("🎉 DONE")
          EOF

      - name: Commit & Push (Safe)
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          find "BSEB 10TH RESULT/Bseb 10th Result 2026" -name "*.json" -print0 | xargs -0 git add

          git commit -m "Extract 10th district clean format" || echo "No changes"

          git pull origin main --no-rebase || true
          git push
