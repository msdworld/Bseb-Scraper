name: Extract 10th District Data

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          lfs: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Dependency
        run: pip install ijson

      - name: Show Initial Files
        run: |
          echo "===== ROOT ====="
          ls -lah

          echo "===== 10TH FOLDER ====="
          ls -lah "BSEB 10TH RESULT/Bseb 10th Result 2026" || true

          echo "===== MASTER FILE ====="
          ls -lh bseb-10th-full-result-2026.json.gz || true
          du -h bseb-10th-full-result-2026.json.gz || true

      - name: Extract Multiple Districts
        run: |
          python << 'EOF'
          import os
          import gzip
          import json
          import ijson

          MASTER_GZ = "bseb-10th-full-result-2026.json.gz"
          BASE_DIR = "BSEB 10TH RESULT/Bseb 10th Result 2026"

          # =========================================
          # EDIT DISTRICTS HERE
          # =========================================
          DISTRICTS = [
            
            ("72", "nalanda"),
            ("73", "bhojpur"),
          ]

          def save_custom_json(file_path, data):
              roll_codes = sorted(data.keys(), key=lambda x: int(x))

              with open(file_path, "w", encoding="utf-8") as f:
                  f.write("{\n")

                  for rc_index, roll_code in enumerate(roll_codes):
                      students = data.get(roll_code, {})
                      roll_nos = sorted(students.keys(), key=lambda x: int(x))

                      f.write(f'  "{roll_code}": {{\n')

                      for rn_index, roll_no in enumerate(roll_nos):
                          student = students[roll_no]
                          student_json = json.dumps(student, ensure_ascii=False, indent=6)
                          lines = student_json.splitlines()

                          for line_index, line in enumerate(lines):
                              if line_index == 0:
                                  f.write(f'    "{roll_no}": {line}\n')
                              else:
                                  f.write(f'    {line}\n')

                          if rn_index < len(roll_nos) - 1:
                              f.write(",\n")

                      f.write("\n  }")
                      if rc_index < len(roll_codes) - 1:
                          f.write(",")
                      f.write("\n")

                  f.write("}\n")

          if not os.path.exists(MASTER_GZ):
              print(f"❌ Master GZ file not found: {MASTER_GZ}")
              raise SystemExit(1)

          os.makedirs(BASE_DIR, exist_ok=True)

          print("📂 Streaming master file once...")
          print("📦 Districts to extract:", len(DISTRICTS))

          district_data_map = {}
          district_stats = {}

          for prefix, name in DISTRICTS:
              district_data_map[prefix] = {}
              district_stats[prefix] = {
                  "name": name,
                  "roll_codes": 0,
                  "students": 0
              }

          processed = 0

          with gzip.open(MASTER_GZ, "rb") as f:
              for roll_code, value in ijson.kvitems(f, ""):
                  rc = str(roll_code)

                  for prefix, name in DISTRICTS:
                      if rc.startswith(prefix):
                          district_data_map[prefix][rc] = value
                          district_stats[prefix]["roll_codes"] += 1
                          district_stats[prefix]["students"] += len(value or {})
                          break

                  processed += 1
                  if processed % 100 == 0:
                      print(f"📚 Master Roll Codes Processed: {processed}")

          print("💾 Saving district files...")

          for prefix, name in DISTRICTS:
              output_json = os.path.join(
                  BASE_DIR,
                  f"{name}-{prefix}-bseb-10th-full-result-2026.json"
              )

              save_custom_json(output_json, district_data_map[prefix])

              print("====================================")
              print(f"✅ Saved: {name}-{prefix}")
              print(f"📚 Roll Codes: {district_stats[prefix]['roll_codes']}")
              print(f"🎓 Students: {district_stats[prefix]['students']}")
              print(f"📄 File: {output_json}")

          print("====================================")
          print("🎉 ALL DISTRICT EXTRACTION COMPLETED")
          EOF

      - name: Validate Extracted District Files
        run: |
          python << 'EOF'
          import os
          import json

          BASE_DIR = "BSEB 10TH RESULT/Bseb 10th Result 2026"

          DISTRICTS = [
            
            
            ("72", "nalanda"),
            ("73", "bhojpur"),
          ]

          print("===== VALIDATION START =====")

          for prefix, name in DISTRICTS:
              file = os.path.join(
                  BASE_DIR,
                  f"{name}-{prefix}-bseb-10th-full-result-2026.json"
              )

              if not os.path.exists(file):
                  print(f"❌ Missing file: {file}")
                  continue

              with open(file, "r", encoding="utf-8") as f:
                  data = json.load(f)

              total = 0
              for rc in data:
                  total += len(data[rc] or {})

              roll_codes = sorted(data.keys(), key=lambda x: int(x))

              print("====================================")
              print(f"✅ {name}-{prefix}")
              print("📚 Roll Codes:", len(data))
              print("🎓 Students:", total)
              print("🔹 First Roll Code:", roll_codes[0] if roll_codes else "none")
              print("🔹 Last Roll Code:", roll_codes[-1] if roll_codes else "none")

          print("====================================")
          print("🎉 VALIDATION COMPLETE")
          EOF

      - name: Show Final Files
        if: always()
        run: |
          echo "===== FINAL 10TH FOLDER ====="
          ls -lah "BSEB 10TH RESULT/Bseb 10th Result 2026" || true

          echo "===== ALL DISTRICT FILE SIZES ====="
          find "BSEB 10TH RESULT/Bseb 10th Result 2026" -maxdepth 1 -name "*.json" -exec du -h {} \;

      - name: Commit District Files
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          find "BSEB 10TH RESULT/Bseb 10th Result 2026" -maxdepth 1 -name "*.json" -print0 | xargs -0 git add
          git add ".github/workflows/10th-district-wise.yml"

          git status
          git commit -m "Extract 10th district data batch 1" || echo "No changes to commit"
          git pull --rebase origin main || true
          git push
