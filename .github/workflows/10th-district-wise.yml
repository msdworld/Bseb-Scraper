name: BSEB 10th District Wise Extraction (Robust Stream)

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Robust Extraction
        run: |
          node << 'EOF'
          const fs = require("fs");
          const path = require("path");
          const zlib = require("zlib");

          console.log("🚀 ROBUST EXTRACTION STARTED");

          const INPUT_FILE = "bseb-10th-full-result-2026.json.gz";

          const OUTPUT_DIR = path.join(
            "BSEB 10TH RESULT",
            "Bseb 10th Result 2026"
          );

          if (!fs.existsSync(OUTPUT_DIR)) {
            fs.mkdirSync(OUTPUT_DIR, { recursive: true });
          }

          const DISTRICT_MAP = {
            "21": "munger",
            "11": "purnea",
            "12": "araria",
            "13": "kishanganj",
            "14": "katihar"
          };

          const writers = {};

          function getWriter(prefix) {
            if (!writers[prefix]) {
              const name = DISTRICT_MAP[prefix] || `district-${prefix}`;
              const file = path.join(
                OUTPUT_DIR,
                `${name}-${prefix}-bseb-10th-full-result-2026.json`
              );

              const stream = fs.createWriteStream(file);
              stream.write("{\n");

              writers[prefix] = {
                stream,
                first: true,
                count: 0
              };

              console.log(`📁 Creating file: ${file}`);
            }
            return writers[prefix];
          }

          function writeStudent(prefix, key, student) {
            const writer = getWriter(prefix);

            const line = `  "${key}": ${JSON.stringify(student)}`;

            if (!writer.first) {
              writer.stream.write(",\n");
            }

            writer.stream.write(line);

            writer.first = false;
            writer.count++;
          }

          const gunzip = zlib.createGunzip();
          const stream = fs.createReadStream(INPUT_FILE).pipe(gunzip);

          let buffer = "";
          let currentKey = null;
          let braceCount = 0;

          let total = 0;

          stream.on("data", chunk => {
            buffer += chunk.toString();

            while (true) {
              if (!currentKey) {
                const keyMatch = buffer.match(/"(\d+)"\s*:\s*\{/);
                if (!keyMatch) break;

                currentKey = keyMatch[1];

                const startIndex = buffer.indexOf(keyMatch[0]);
                buffer = buffer.slice(startIndex + keyMatch[0].length - 1);

                braceCount = 1;
              }

              let i = 0;
              for (; i < buffer.length; i++) {
                if (buffer[i] === "{") braceCount++;
                else if (buffer[i] === "}") braceCount--;

                if (braceCount === 0) {
                  const objStr = buffer.slice(0, i + 1);

                  try {
                    const student = JSON.parse(objStr);

                    const rollCode = String(student.rollCode || "");
                    if (rollCode.length >= 2) {
                      const prefix = rollCode.substring(0, 2);
                      writeStudent(prefix, currentKey, student);
                      total++;
                    }
                  } catch {}

                  buffer = buffer.slice(i + 1);
                  currentKey = null;
                  break;
                }
              }

              if (braceCount !== 0) break;
            }
          });

          stream.on("end", () => {
            for (const prefix of Object.keys(writers)) {
              const w = writers[prefix];
              w.stream.write("\n}\n");
              w.stream.end();

              console.log(`✅ ${prefix} → ${w.count} students`);
            }

            console.log("🎉 DONE");
            console.log(`🎓 Total processed: ${total}`);
          });

          EOF

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add "BSEB 10TH RESULT/Bseb 10th Result 2026"

          git commit -m "10th district-wise extraction (robust stream)" || echo "No changes"

          git pull --rebase origin main || true
          git push
