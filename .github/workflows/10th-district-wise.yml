name: BSEB 10th District Wise Extraction

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Extraction Script
        run: |
          node << 'EOF'
          const fs = require("fs");
          const path = require("path");
          const zlib = require("zlib");

          console.log("🚀 BSEB 10TH DISTRICT EXTRACTION STARTED (GZIP)");

          // ===============================
          // 📁 INPUT FILE (.gz)
          // ===============================
          const MAIN_FILE = "bseb-10th-full-result-2026.json.gz";

          // ===============================
          // 📂 OUTPUT DIRECTORY
          // ===============================
          const OUTPUT_DIR = path.join(
            "BSEB 10TH RESULT",
            "Bseb 10th Result 2026"
          );

          if (!fs.existsSync(OUTPUT_DIR)) {
            fs.mkdirSync(OUTPUT_DIR, { recursive: true });
          }

          // ===============================
          // 🗺️ DISTRICT MAP
          // ===============================
          const DISTRICT_MAP = {
            "21": "munger",
            "11": "purnea",
            "12": "araria",
            "13": "kishanganj",
            "14": "katihar"
            // 👉 add all prefixes
          };

          // ===============================
          // LOAD + DECOMPRESS
          // ===============================
          if (!fs.existsSync(MAIN_FILE)) {
            console.log("❌ File not found:", MAIN_FILE);
            process.exit(1);
          }

          console.log("📦 Reading compressed file...");

          const compressed = fs.readFileSync(MAIN_FILE);

          console.log("📦 Decompressing...");

          const decompressed = zlib.gunzipSync(compressed);

          console.log("📦 Parsing JSON...");

          const mainData = JSON.parse(decompressed.toString("utf8"));

          console.log("📊 Total students:", Object.keys(mainData).length);

          // ===============================
          // GROUPING
          // ===============================
          const districtData = {};

          for (const key of Object.keys(mainData)) {
            const student = mainData[key];

            const rollCode = String(student.rollCode || "");
            if (rollCode.length < 2) continue;

            const prefix = rollCode.substring(0, 2);

            if (!districtData[prefix]) {
              districtData[prefix] = {};
            }

            if (!districtData[prefix][key]) {
              districtData[prefix][key] = student;
            }
          }

          // ===============================
          // SAVE FILES
          // ===============================
          let totalFiles = 0;
          let totalStudents = 0;

          for (const prefix of Object.keys(districtData)) {

            const districtName = DISTRICT_MAP[prefix] || `district-${prefix}`;

            const fileName = `${districtName}-${prefix}-bseb-10th-full-result-2026.json`;

            const filePath = path.join(OUTPUT_DIR, fileName);

            fs.writeFileSync(
              filePath,
              JSON.stringify(districtData[prefix], null, 2)
            );

            const count = Object.keys(districtData[prefix]).length;

            console.log(`✅ Saved: ${fileName} | Students: ${count}`);

            totalFiles++;
            totalStudents += count;
          }

          console.log("🎉 EXTRACTION COMPLETED");
          console.log("📁 Total District Files:", totalFiles);
          console.log("🎓 Total Students Written:", totalStudents);

          EOF

      - name: Commit & Push Files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add "BSEB 10TH RESULT/Bseb 10th Result 2026"

          git commit -m "10th district-wise extraction (gz)" || echo "No changes"

          git pull --rebase origin main || true
          git push
