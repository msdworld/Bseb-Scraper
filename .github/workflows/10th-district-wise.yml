name: Extract 10th District Data

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          lfs: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Dependency
        run: pip install ijson

      - name: Extract Multiple Districts (COMPACT MODE)
        run: |
          python << 'EOF'
          import os
          import gzip
          import json
          import ijson

          MASTER_GZ = "bseb-10th-full-result-2026.json.gz"
          BASE_DIR = "BSEB 10TH RESULT/Bseb 10th Result 2026"

          # =========================
          # EDIT DISTRICTS HERE
          # =========================
          DISTRICTS = [
              ("23", "lakhisarai"),
          ]

          # =========================
          # COMPACT STUDENT FORMAT
          # =========================
          def compact_student(student):
              if "subjects" in student and isinstance(student["subjects"], list):
                  # ensure subjects are compact (single line)
                  student["subjects"] = [
                      {k: v for k, v in sub.items()} for sub in student["subjects"]
                  ]
              return student

          # =========================
          # SAVE COMPACT JSON
          # =========================
          def save_custom_json(file_path, data):
              roll_codes = sorted(data.keys(), key=lambda x: int(x))

              with open(file_path, "w", encoding="utf-8") as f:
                  f.write("{")

                  for rc_index, roll_code in enumerate(roll_codes):
                      students = data.get(roll_code, {})
                      roll_nos = sorted(students.keys(), key=lambda x: int(x))

                      f.write(f'"{roll_code}":{{')

                      for rn_index, roll_no in enumerate(roll_nos):
                          student = compact_student(students[roll_no])

                          # 🔥 FULL COMPACT (NO INDENT)
                          student_json = json.dumps(student, ensure_ascii=False, separators=(",", ":"))

                          f.write(f'"{roll_no}":{student_json}')

                          if rn_index < len(roll_nos) - 1:
                              f.write(",")

                      f.write("}")

                      if rc_index < len(roll_codes) - 1:
                          f.write(",")

                  f.write("}")

          if not os.path.exists(MASTER_GZ):
              print(f"❌ Master GZ file not found: {MASTER_GZ}")
              raise SystemExit(1)

          os.makedirs(BASE_DIR, exist_ok=True)

          print("📂 Streaming master file once...")

          district_data_map = {}
          district_stats = {}

          for prefix, name in DISTRICTS:
              district_data_map[prefix] = {}
              district_stats[prefix] = {
                  "name": name,
                  "roll_codes": 0,
                  "students": 0
              }

          processed = 0

          with gzip.open(MASTER_GZ, "rb") as f:
              for roll_code, value in ijson.kvitems(f, ""):
                  rc = str(roll_code)

                  for prefix, name in DISTRICTS:
                      if rc.startswith(prefix):
                          district_data_map[prefix][rc] = value
                          district_stats[prefix]["roll_codes"] += 1
                          district_stats[prefix]["students"] += len(value or {})
                          break

                  processed += 1
                  if processed % 200 == 0:
                      print(f"📚 Processed: {processed}")

          print("💾 Saving compact district files...")

          for prefix, name in DISTRICTS:
              output_json = os.path.join(
                  BASE_DIR,
                  f"{name}-{prefix}-bseb-10th-full-result-2026.json"
              )

              save_custom_json(output_json, district_data_map[prefix])

              print("====================================")
              print(f"✅ Saved: {name}-{prefix}")
              print(f"📚 Roll Codes: {district_stats[prefix]['roll_codes']}")
              print(f"🎓 Students: {district_stats[prefix]['students']}")

          print("🎉 DONE (COMPACT MODE)")
          EOF

      - name: Commit District Files (SAFE PUSH)
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          find "BSEB 10TH RESULT/Bseb 10th Result 2026" -name "*.json" -print0 | xargs -0 git add

          git commit -m "Extract 10th district compact data" || echo "No changes"

          # 🔥 IMPORTANT: NO REBASE (avoids your previous conflict issue)
          git pull origin main --no-rebase || true

          git push
