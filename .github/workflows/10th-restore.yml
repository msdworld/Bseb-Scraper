name: Extract Seen RollNo IDs From Main GZ

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check Main GZ
        run: |
          echo "===== CHECK MAIN GZ ====="
          ls -lh bseb-10th-full-result-2026.json.gz || true

      - name: Extract rollCode-rollNo IDs (Chunk Regex Method)
        run: |
          node - <<'EOF'
          const fs = require("fs");
          const zlib = require("zlib");

          const INPUT_GZ = "bseb-10th-full-result-2026.json.gz";
          const OUTPUT_TXT = "bseb-10th-seen-rollnos.txt";

          if (!fs.existsSync(INPUT_GZ)) {
            console.log("❌ Main GZ file not found");
            process.exit(1);
          }

          console.log("🔍 Extracting rollCode-rollNo IDs using chunk regex...");

          const seen = new Set();
          let total = 0;

          let buffer = "";

          const gunzip = zlib.createGunzip();
          const stream = fs.createReadStream(INPUT_GZ).pipe(gunzip);

          stream.on("data", (chunk) => {
            buffer += chunk.toString("utf8");

            // Keep only last part to handle split patterns safely
            if (buffer.length > 500000) {
              processBuffer(buffer.slice(0, 400000));
              buffer = buffer.slice(400000);
            }
          });

          stream.on("end", () => {
            processBuffer(buffer);

            const sorted = Array.from(seen).sort((a, b) => {
              const [rcA, rnA] = a.split("-").map(Number);
              const [rcB, rnB] = b.split("-").map(Number);
              if (rcA !== rcB) return rcA - rcB;
              return rnA - rnB;
            });

            fs.writeFileSync(OUTPUT_TXT, sorted.join("\n"), "utf8");

            console.log("✅ Extraction complete");
            console.log(`📚 Total IDs Extracted: ${total}`);
          });

          stream.on("error", (err) => {
            console.log("❌ Stream error:", err.message);
            process.exit(1);
          });

          function processBuffer(text) {
            // Match blocks like:
            // "11001":{"2600001":{
            // OR with spaces/newlines
            const regex = /"(\d{5})"\s*:\s*\{\s*"(\d{7})"\s*:\s*\{/g;

            let match;
            while ((match = regex.exec(text)) !== null) {
              const rollCode = match[1];
              const rollNo = match[2];
              const id = `${rollCode}-${rollNo}`;

              if (!seen.has(id)) {
                seen.add(id);
                total++;

                if (total % 50000 === 0) {
                  console.log(`📦 Extracted ${total} IDs...`);
                }
              }
            }

            // ALSO catch remaining rollNos inside same rollCode block
            // This helps for patterns like:
            // "11001":{"2600001":{...},"2600002":{...},"2600003":{...}}
            const rollCodeRegex = /"(\d{5})"\s*:\s*\{([\s\S]*?)(?="(\d{5})"\s*:\s*\{|$)/g;
            let rcMatch;

            while ((rcMatch = rollCodeRegex.exec(text)) !== null) {
              const rollCode = rcMatch[1];
              const block = rcMatch[2];

              const rnRegex = /"(\d{7})"\s*:\s*\{/g;
              let rnMatch;

              while ((rnMatch = rnRegex.exec(block)) !== null) {
                const rollNo = rnMatch[1];
                const id = `${rollCode}-${rollNo}`;

                if (!seen.has(id)) {
                  seen.add(id);
                  total++;

                  if (total % 50000 === 0) {
                    console.log(`📦 Extracted ${total} IDs...`);
                  }
                }
              }
            }
          }
          EOF

      - name: Show Extracted File
        run: |
          echo "===== TOTAL IDS ====="
          wc -l bseb-10th-seen-rollnos.txt || true

          echo "===== FILE SIZE ====="
          ls -lh bseb-10th-seen-rollnos.txt || true
          du -h bseb-10th-seen-rollnos.txt || true

          echo "===== FIRST 10 ====="
          head -n 10 bseb-10th-seen-rollnos.txt || true

          echo "===== LAST 10 ====="
          tail -n 10 bseb-10th-seen-rollnos.txt || true

      - name: Commit Extracted IDs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add bseb-10th-seen-rollnos.txt
          git commit -m "Add extracted seen rollCode-rollNo IDs" || echo "No changes to commit"

          git fetch origin main
          git rebase origin/main || true
          git push
