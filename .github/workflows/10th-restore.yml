name: Extract Seen RollNos From Main GZ

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Show Existing Files
        run: |
          echo "===== FILES IN REPO ====="
          ls -lh || true

      - name: Check Main GZ Exists
        run: |
          if [ ! -f bseb-10th-full-result-2026.json.gz ]; then
            echo "❌ File not found: bseb-10th-full-result-2026.json.gz"
            exit 1
          fi

          echo "✅ Found main GZ"
          ls -lh bseb-10th-full-result-2026.json.gz

      - name: Extract rollCode-rollNo IDs
        run: |
          echo "📦 Extracting rollCode-rollNo IDs..."
          rm -f bseb-10th-seen-rollnos.txt
          touch bseb-10th-seen-rollnos.txt

          gunzip -c bseb-10th-full-result-2026.json.gz > extracted.json

          awk '
            BEGIN { current_rollcode = "" }

            /^[[:space:]]*"([0-9]{5})"[[:space:]]*:[[:space:]]*{/ {
              line = $0
              gsub(/^[[:space:]]*"/, "", line)
              gsub(/".*$/, "", line)
              current_rollcode = line
            }

            /^[[:space:]]*"([0-9]{7})"[[:space:]]*:[[:space:]]*{/ {
              line = $0
              gsub(/^[[:space:]]*"/, "", line)
              gsub(/".*$/, "", line)
              if (current_rollcode != "") {
                print current_rollcode "-" line
              }
            }
          ' extracted.json | sort -u > bseb-10th-seen-rollnos.txt

          echo "✅ Extraction complete"
          echo "===== TOTAL IDS ====="
          wc -l bseb-10th-seen-rollnos.txt || true

          echo "===== FIRST 10 ====="
          head -10 bseb-10th-seen-rollnos.txt || true

          echo "===== LAST 10 ====="
          tail -10 bseb-10th-seen-rollnos.txt || true

          rm -f extracted.json

      - name: Commit and Push Seen File
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add bseb-10th-seen-rollnos.txt
          git commit -m "Extract seen rollCode-rollNo IDs from main GZ" || echo "No changes to commit"

          git pull --rebase origin main || true
          git push

      - name: Upload Artifact Backup
        uses: actions/upload-artifact@v4
        with:
          name: bseb-10th-seen-rollnos-backup
          path: bseb-10th-seen-rollnos.txt
