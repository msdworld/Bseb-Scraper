name: Extract Seen RollNo IDs From Main GZ

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore Main GZ from Repo
        run: |
          echo "===== CHECK MAIN GZ ====="
          ls -lh bseb-10th-full-result-2026.json.gz || true

      - name: Extract rollCode-rollNo IDs
        run: |
          node - <<'EOF'
          const fs = require("fs");
          const zlib = require("zlib");
          const readline = require("readline");

          const INPUT_GZ = "bseb-10th-full-result-2026.json.gz";
          const OUTPUT_TXT = "bseb-10th-seen-rollnos.txt";

          if (!fs.existsSync(INPUT_GZ)) {
            console.log("❌ Main GZ file not found");
            process.exit(1);
          }

          console.log("🔍 Extracting rollCode-rollNo IDs from large GZ...");

          const seen = new Set();
          let total = 0;

          const gunzip = zlib.createGunzip();
          const input = fs.createReadStream(INPUT_GZ).pipe(gunzip);

          const rl = readline.createInterface({
            input,
            crlfDelay: Infinity
          });

          // Matches:
          // "2600001": {
          // inside rollCode block already known from previous lines
          let currentRollCode = null;

          rl.on("line", (line) => {
            // Match rollCode block like: "11001": {
            const rcMatch = line.match(/^\s*"(\d{5})":\s*\{$/);
            if (rcMatch) {
              currentRollCode = rcMatch[1];
              return;
            }

            // Match rollNo student like: "2600001": {
            const rnMatch = line.match(/^\s*"(\d{7})":\s*\{$/);
            if (rnMatch && currentRollCode) {
              const rollNo = rnMatch[1];
              const id = `${currentRollCode}-${rollNo}`;
              if (!seen.has(id)) {
                seen.add(id);
                total++;

                if (total % 50000 === 0) {
                  console.log(`📦 Extracted ${total} IDs...`);
                }
              }
            }
          });

          rl.on("close", () => {
            fs.writeFileSync(OUTPUT_TXT, Array.from(seen).sort().join("\n"), "utf8");
            console.log(`✅ Extraction complete`);
            console.log(`📚 Total IDs Extracted: ${total}`);
          });
          EOF

      - name: Show Extracted File
        run: |
          echo "===== TOTAL IDS ====="
          wc -l bseb-10th-seen-rollnos.txt || true

          echo "===== FILE SIZE ====="
          ls -lh bseb-10th-seen-rollnos.txt || true
          du -h bseb-10th-seen-rollnos.txt || true

          echo "===== FIRST 10 ====="
          head -n 10 bseb-10th-seen-rollnos.txt || true

          echo "===== LAST 10 ====="
          tail -n 10 bseb-10th-seen-rollnos.txt || true

      - name: Commit Extracted IDs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add bseb-10th-seen-rollnos.txt
          git commit -m "Add extracted seen rollCode-rollNo IDs" || echo "No changes to commit"

          git fetch origin main
          git rebase origin/main || true
          git push
