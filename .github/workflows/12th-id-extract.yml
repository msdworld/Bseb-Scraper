name: Extract BSEB 12th Seen IDs

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Restore 12th Main GZ from specific commit
        run: |
          git fetch --all
          git checkout YOUR_GOOD_12TH_COMMIT_ID -- bseb-12th-full-result-2026.json.gz || true

      - name: Check Main GZ
        run: |
          echo "===== CHECK MAIN GZ ====="
          ls -lh bseb-12th-full-result-2026.json.gz || true
          du -h bseb-12th-full-result-2026.json.gz || true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Extract rollCode-rollNo IDs (Chunk Stream Safe)
        run: |
          echo "Extracting rollCode-rollNo IDs..."

          node - <<'EOF'
          const fs = require("fs");
          const zlib = require("zlib");

          const INPUT = "bseb-12th-full-result-2026.json.gz";
          const OUTPUT = "bseb-12th-seen-rollnos.txt";

          if (!fs.existsSync(INPUT)) {
            console.error("❌ Main GZ file not found");
            process.exit(1);
          }

          const gunzip = zlib.createGunzip();
          const input = fs.createReadStream(INPUT);
          const output = fs.createWriteStream(OUTPUT, { flags: "w" });

          let buffer = "";
          let currentRollCode = null;
          let total = 0;

          input.pipe(gunzip);

          gunzip.on("data", (chunk) => {
            buffer += chunk.toString("utf8");

            // Keep buffer from growing too large
            if (buffer.length > 200000) {
              processBuffer(false);
            }
          });

          gunzip.on("end", () => {
            processBuffer(true);
            output.end(() => {
              console.log("✅ Extraction complete");
              console.log(`📚 Total IDs Extracted: ${total}`);
            });
          });

          gunzip.on("error", (err) => {
            console.error("❌ Gunzip error:", err.message);
            process.exit(1);
          });

          function processBuffer(isFinal) {
            const safeLength = isFinal ? buffer.length : buffer.length - 500;
            if (safeLength <= 0) return;

            const text = buffer.slice(0, safeLength);
            buffer = buffer.slice(safeLength);

            // Match either:
            // "31320":{
            // or
            // "2600057":{
            const regex = /"(\d{5}|\d{7})"\s*:\s*\{/g;
            let match;

            while ((match = regex.exec(text)) !== null) {
              const key = match[1];

              if (key.length === 5) {
                currentRollCode = key;
              } else if (key.length === 7 && currentRollCode) {
                output.write(`${currentRollCode}-${key}\n`);
                total++;
              }
            }
          }
          EOF

      - name: Show Extracted File Info
        run: |
          echo "===== TOTAL IDS ====="
          wc -l bseb-12th-seen-rollnos.txt || true

          echo "===== FILE SIZE ====="
          ls -lh bseb-12th-seen-rollnos.txt || true
          du -h bseb-12th-seen-rollnos.txt || true

          echo "===== FIRST 10 ====="
          head -10 bseb-12th-seen-rollnos.txt || true

          echo "===== LAST 10 ====="
          tail -10 bseb-12th-seen-rollnos.txt || true

      - name: Commit Seen IDs File
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add bseb-12th-seen-rollnos.txt
          git commit -m "Add BSEB 12th seen rollCode-rollNo IDs" || echo "No changes to commit"
          git pull --rebase origin main || true
          git push
