name: Extract BSEB 12th Seen IDs

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Restore 12th Main GZ from specific commit
        run: |
          git fetch --all
          git checkout 7519a2f -- bseb-12th-full-result-2026.json.gz || true

      - name: Check Main GZ
        run: |
          echo "===== CHECK MAIN GZ ====="
          ls -lh bseb-12th-full-result-2026.json.gz || true
          du -h bseb-12th-full-result-2026.json.gz || true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Extract rollCode-rollNo IDs (STREAM SAFE)
        run: |
          echo "Extracting rollCode-rollNo IDs..."

          node - <<'EOF'
          const fs = require("fs");
          const zlib = require("zlib");
          const readline = require("readline");

          const INPUT = "bseb-12th-full-result-2026.json.gz";
          const OUTPUT = "bseb-12th-seen-rollnos.txt";

          if (!fs.existsSync(INPUT)) {
            console.error("❌ Main GZ file not found");
            process.exit(1);
          }

          const gunzip = zlib.createGunzip();
          const input = fs.createReadStream(INPUT);
          const rl = readline.createInterface({
            input: input.pipe(gunzip),
            crlfDelay: Infinity
          });

          const out = fs.createWriteStream(OUTPUT, { flags: "w" });

          let currentRollCode = null;
          let total = 0;

          // Matches:
          // "31320": {
          const rollCodeRegex = /^\s*"(\d{5})"\s*:\s*\{$/;

          // Matches:
          // "2600057": {
          const rollNoRegex = /^\s*"(\d{7})"\s*:\s*\{$/;

          rl.on("line", (line) => {
            const rcMatch = line.match(rollCodeRegex);
            if (rcMatch) {
              currentRollCode = rcMatch[1];
              return;
            }

            const rnMatch = line.match(rollNoRegex);
            if (rnMatch && currentRollCode) {
              out.write(`${currentRollCode}-${rnMatch[1]}\n`);
              total++;
            }
          });

          rl.on("close", () => {
            out.end(() => {
              console.log("✅ Extraction complete");
              console.log(`📚 Total IDs Extracted: ${total}`);
            });
          });

          rl.on("error", (err) => {
            console.error("❌ Read error:", err.message);
            process.exit(1);
          });

          gunzip.on("error", (err) => {
            console.error("❌ Gunzip error:", err.message);
            process.exit(1);
          });
          EOF

      - name: Show Extracted File Info
        run: |
          echo "===== TOTAL IDS ====="
          wc -l bseb-12th-seen-rollnos.txt || true

          echo "===== FILE SIZE ====="
          ls -lh bseb-12th-seen-rollnos.txt || true
          du -h bseb-12th-seen-rollnos.txt || true

          echo "===== FIRST 10 ====="
          head -10 bseb-12th-seen-rollnos.txt || true

          echo "===== LAST 10 ====="
          tail -10 bseb-12th-seen-rollnos.txt || true

      - name: Commit Seen IDs File
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add bseb-12th-seen-rollnos.txt
          git commit -m "Add BSEB 12th seen rollCode-rollNo IDs" || echo "No changes to commit"
          git pull --rebase origin main || true
          git push
