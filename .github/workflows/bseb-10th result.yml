name: BSEB 10th School List 2026

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install axios

      - name: Run School List Script
        run: node "BSEB 10TH Result/script.js"

      - name: Validate Output
        run: |
          node - <<'EOF'
          const fs = require("fs");

          const file = "bseb-10th-school-list-2026.json";

          if (!fs.existsSync(file)) {
            console.error("❌ Output JSON missing");
            process.exit(1);
          }

          const raw = fs.readFileSync(file, "utf8");
          const data = JSON.parse(raw);

          const keys = Object.keys(data);

          console.log("✅ JSON valid");
          console.log("📚 Total Valid Roll Codes:", keys.length);

          console.log("===== FIRST 10 =====");
          console.log(keys.slice(0, 10));

          console.log("===== LAST 10 =====");
          console.log(keys.slice(-10));
          EOF

      - name: Show File Size
        run: |
          echo "===== FILE SIZE ====="
          ls -lh bseb-10th-school-list-2026.json
          du -h bseb-10th-school-list-2026.json

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add bseb-10th-school-list-2026.json
          git status
          git commit -m "Update BSEB 10th school list 2026" || echo "No changes to commit"
          git pull --rebase origin main || true
          git push
