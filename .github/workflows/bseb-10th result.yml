name: BSEB 10th Result Test

on:
  workflow_dispatch:

jobs:
  test-result:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run Test Script
        run: node "BSEB 10TH Result/script.js"

      - name: Show Output
        if: always()
        run: |
          echo "===== OUTPUT FILE ====="
          ls -lah "BSEB 10TH Result" || true
          echo "===== JSON CONTENT ====="
          cat "BSEB 10TH Result/test-result-2026-10th.json" || true

      - name: Commit Test Result
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add "BSEB 10TH Result/test-result-2026-10th.json"
          git commit -m "Add BSEB 10th test result JSON" || echo "No changes to commit"
          git pull --rebase origin main || true
          git push
