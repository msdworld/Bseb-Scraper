name: BSEB 10th API Test

on:
  workflow_dispatch:

jobs:
  test-result:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install puppeteer

      - name: Run Test Script
        run: node "BSEB 10TH Result/script.js"

      - name: Show Output
        if: always()
        run: |
          echo "===== BSEB 10TH Result Folder ====="
          ls -lah "BSEB 10TH Result" || true

          echo "===== TEST RESULT JSON ====="
          [ -f "BSEB 10TH Result/test-result-2026-10th.json" ] && cat "BSEB 10TH Result/test-result-2026-10th.json" || echo "No result JSON found"

          echo "===== NETWORK LOG ====="
          [ -f "BSEB 10TH Result/network-log.json" ] && cat "BSEB 10TH Result/network-log.json" || echo "No network log found"

      - name: Upload Debug Files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bseb-10th-api-test
          path: |
            BSEB 10TH Result/test-result-2026-10th.json
            BSEB 10TH Result/network-log.json
