name: BSEB 10th API Test

on:
  workflow_dispatch:

jobs:
  test-result:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install axios

      - name: Run 10th API Test
        run: node "BSEB 10TH Result/script.js"

      - name: Show Output
        if: always()
        run: |
          echo "===== BSEB 10TH Result Folder ====="
          ls -lah "BSEB 10TH Result" || true

          echo "===== TEST RESULT JSON ====="
          cat "BSEB 10TH Result/test-result-2026-10th.json" || true

      - name: Upload Output Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bseb-10th-api-test-output
          path: |
            BSEB 10TH Result/test-result-2026-10th.json
