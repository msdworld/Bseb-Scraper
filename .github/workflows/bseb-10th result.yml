name: BSEB 10th Remaining Result 2026

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          lfs: false
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install axios

      - name: Check Main Master File
        run: |
          echo "===== CHECK MAIN GZ ====="
          ls -lh bseb-10th-full-result-2026.json.gz || true
          du -h bseb-10th-full-result-2026.json.gz || true

      - name: Check Seen IDs File
        run: |
          echo "===== CHECK SEEN IDS FILE ====="
          ls -lh bseb-10th-seen-rollnos.txt || true
          du -h bseb-10th-seen-rollnos.txt || true
          wc -l bseb-10th-seen-rollnos.txt || true

      - name: Run Remaining Scraper
        run: node "BSEB 10TH Result/script.js"

      - name: Validate File2 GZ
        run: |
          node - <<'EOF'
          const fs = require("fs");
          const zlib = require("zlib");

          function count(data) {
            let total = 0;
            for (const rc of Object.keys(data)) {
              total += Object.keys(data[rc] || {}).length;
            }
            return total;
          }

          const gzFile = "bseb-10th-full-result-2026-2.json.gz";

          if (!fs.existsSync(gzFile)) {
            console.log("⚠️ File2 GZ not found yet");
            process.exit(0);
          }

          try {
            const gzRaw = fs.readFileSync(gzFile);
            const unzipped = zlib.gunzipSync(gzRaw).toString("utf8");
            const data = JSON.parse(unzipped);
            console.log("✅ File2 GZ valid");
            console.log("📚 Roll Codes:", Object.keys(data).length);
            console.log("🎓 Students:", count(data));
          } catch (e) {
            console.error("❌ File2 GZ invalid:", e.message);
            process.exit(1);
          }
          EOF

      - name: Show File Sizes
        if: always()
        run: |
          echo "===== MASTER GZ ====="
          ls -lh bseb-10th-full-result-2026.json.gz || true
          du -h bseb-10th-full-result-2026.json.gz || true

          echo "===== FILE2 JSON ====="
          ls -lh bseb-10th-full-result-2026-2.json || true
          du -h bseb-10th-full-result-2026-2.json || true

          echo "===== FILE2 GZ ====="
          ls -lh bseb-10th-full-result-2026-2.json.gz || true
          du -h bseb-10th-full-result-2026-2.json.gz || true

          echo "===== SEEN IDS ====="
          ls -lh bseb-10th-seen-rollnos.txt || true
          du -h bseb-10th-seen-rollnos.txt || true
          wc -l bseb-10th-seen-rollnos.txt || true

      - name: Commit and Push Safe Files
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git restore package.json package-lock.json || true
          rm -rf node_modules || true

          # Never push raw json
          rm -f bseb-10th-full-result-2026-2.json || true

          [ -f bseb-10th-full-result-2026-2.json.gz ] && git add bseb-10th-full-result-2026-2.json.gz
          [ -f bseb-10th-seen-rollnos.txt ] && git add bseb-10th-seen-rollnos.txt
          [ -f bseb-10th-full-result-2026.json.gz ] && git add bseb-10th-full-result-2026.json.gz
          [ -f bseb-10th-school-list-2026.json ] && git add bseb-10th-school-list-2026.json
          [ -f "BSEB 10TH Result/script.js" ] && git add "BSEB 10TH Result/script.js"
          [ -f ".github/workflows/bseb-10th-full-result.yml" ] && git add ".github/workflows/bseb-10th-full-result.yml"

          git status
          git commit -m "Update BSEB 10th remaining result 2026" || echo "No changes to commit"

          git pull --rebase origin main || true
          git push

      - name: Upload Backup Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bseb-10th-remaining-result-data
          path: |
            bseb-10th-full-result-2026-2.json.gz
            bseb-10th-seen-rollnos.txt
