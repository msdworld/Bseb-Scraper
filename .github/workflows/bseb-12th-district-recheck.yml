name: BSEB 12th District Recheck

on:
  workflow_dispatch:

jobs:
  recheck:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Show Initial Files
        run: |
          echo "===== ROOT ====="
          ls -lah

          echo "===== 12TH FOLDER ====="
          ls -lah "BSEB 12TH RESULT/Bseb 12th Result 2026" || true

          echo "===== COLLEGE LIST ====="
          ls -lh bseb-12th-college-list-2026.json || true
          du -h bseb-12th-college-list-2026.json || true

      - name: Run District Script
        run: node "BSEB 12TH RESULT/Bseb 12th Result 2026/script.js"

      - name: Validate District JSON
        if: always()
        run: |
          node << 'EOF'
          const fs = require("fs");
          const path = require("path");

          const SCRIPT_PATH = path.join("BSEB 12TH RESULT", "Bseb 12th Result 2026", "script.js");
          const scriptText = fs.readFileSync(SCRIPT_PATH, "utf8");

          const prefixMatch = scriptText.match(/const DISTRICT_PREFIX = "([^"]+)"/);
          const fileMatch = scriptText.match(/const OUTPUT_FILE_NAME = "([^"]+)"/);

          if (!prefixMatch || !fileMatch) {
            console.log("❌ Could not detect DISTRICT_PREFIX or OUTPUT_FILE_NAME from script.js");
            process.exit(1);
          }

          const DISTRICT_PREFIX = prefixMatch[1];
          const OUTPUT_FILE_NAME = fileMatch[1];

          const file = path.join("BSEB 12TH RESULT", "Bseb 12th Result 2026", OUTPUT_FILE_NAME);

          if (!fs.existsSync(file)) {
            console.log("❌ District file not found:", file);
            process.exit(1);
          }

          const data = JSON.parse(fs.readFileSync(file, "utf8"));

          let total = 0;
          for (const rc of Object.keys(data)) {
            total += Object.keys(data[rc] || {}).length;
          }

          console.log("✅ District JSON valid");
          console.log("🔢 Prefix:", DISTRICT_PREFIX);
          console.log("📁 File:", OUTPUT_FILE_NAME);
          console.log("📚 Roll Codes:", Object.keys(data).length);
          console.log("🎓 Students:", total);

          const rollCodes = Object.keys(data).sort((a, b) => Number(a) - Number(b));
          console.log("🔹 First Roll Code:", rollCodes[0] || "none");
          console.log("🔹 Last Roll Code:", rollCodes[rollCodes.length - 1] || "none");
          EOF

      - name: Show Final Files
        if: always()
        run: |
          echo "===== FINAL 12TH FOLDER ====="
          ls -lah "BSEB 12TH RESULT/Bseb 12th Result 2026" || true

      - name: Commit and Push
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # clean npm junk
          rm -rf node_modules

          # restore package noise if changed
          git restore package.json package-lock.json || true

          # detect output file name from script
          OUTPUT_FILE_NAME=$(node -e "
            const fs = require('fs');
            const text = fs.readFileSync('BSEB 12TH RESULT/Bseb 12th Result 2026/script.js','utf8');
            const m = text.match(/const OUTPUT_FILE_NAME = \"([^\"]+)\"/);
            console.log(m ? m[1] : '');
          ")

          echo "Detected district file: $OUTPUT_FILE_NAME"

          if [ -n "$OUTPUT_FILE_NAME" ] && [ -f "BSEB 12TH RESULT/Bseb 12th Result 2026/$OUTPUT_FILE_NAME" ]; then
            git add "BSEB 12TH RESULT/Bseb 12th Result 2026/$OUTPUT_FILE_NAME"
          fi

          git add "BSEB 12TH RESULT/Bseb 12th Result 2026/script.js"
          git add ".github/workflows/bseb-12th-district-recheck.yml"

          git status
          git commit -m "Recheck 12th district result ($OUTPUT_FILE_NAME)" || echo "No changes to commit"

          # 🔥 SAFE SYNC FOR PARALLEL RUNS
          echo "🔄 Syncing with remote..."
          git fetch origin main

          git rebase origin/main || {
            echo "⚠️ Rebase failed, trying merge..."
            git rebase --abort || true
            git pull --no-rebase origin main || true
          }

          echo "🚀 Pushing..."
          git push || {
            echo "⚠️ Push failed, retrying with force..."
            git push --force
          }
