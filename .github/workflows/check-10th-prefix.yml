name: Check 10th Roll Code Prefixes

on:
  workflow_dispatch:

jobs:
  prefix-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Show Files
        run: |
          echo "===== ROOT ====="
          ls -lah
          echo "===== SCHOOL LIST ====="
          ls -lh bseb-10th-school-list-2026.json || true

      - name: Extract Unique Prefixes
        run: |
          node << 'EOF'
          const fs = require("fs");

          const FILE = "bseb-10th-school-list-2026.json";

          if (!fs.existsSync(FILE)) {
            console.log("❌ File not found:", FILE);
            process.exit(1);
          }

          const data = JSON.parse(fs.readFileSync(FILE, "utf8"));

          const prefixes = new Set();

          Object.keys(data).forEach(code => {
            if (/^\d+$/.test(code)) {
              const prefix = code.slice(0, 2);
              prefixes.add(prefix);
            }
          });

          const sorted = Array.from(prefixes).sort((a, b) => Number(a) - Number(b));

          console.log("====================================");
          console.log("✅ UNIQUE PREFIXES FOUND:", sorted.length);
          console.log("====================================");

          sorted.forEach(p => console.log(p));

          console.log("====================================");
          EOF
