name: BSEB Full Recheck Tempo

on:
  workflow_dispatch:

jobs:
  recheck:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Show Files Before Restore
        run: |
          echo "===== ROOT FILES ====="
          ls -lh

      - name: Restore JSON from GZ
        run: |
          if [ -f bseb-12th-full-result-2026.json.gz ]; then
            echo "===== RESTORING JSON FROM GZ ====="
            file bseb-12th-full-result-2026.json.gz || true
            ls -lh bseb-12th-full-result-2026.json.gz

            gzip -t bseb-12th-full-result-2026.json.gz
            gunzip -c bseb-12th-full-result-2026.json.gz > bseb-12th-full-result-2026.json

            echo "===== JSON RESTORED ====="
            ls -lh bseb-12th-full-result-2026.json
          else
            echo "⚠️ No GZ found. Starting with empty JSON."
            echo "{}" > bseb-12th-full-result-2026.json
          fi

      - name: Validate JSON Before Run
        run: |
          node -e "
          const fs=require('fs');
          const data=JSON.parse(fs.readFileSync('bseb-12th-full-result-2026.json','utf8'));
          let total=0;
          for(const rc of Object.keys(data)) total += Object.keys(data[rc]||{}).length;
          console.log('✅ JSON valid');
          console.log('📚 Roll Codes:', Object.keys(data).length);
          console.log('🎓 Students:', total);
          "

      - name: Run Recheck Script
        run: node script.js

      - name: Validate JSON After Run
        if: always()
        run: |
          node -e "
          const fs=require('fs');
          const data=JSON.parse(fs.readFileSync('bseb-12th-full-result-2026.json','utf8'));
          let total=0;
          for(const rc of Object.keys(data)) total += Object.keys(data[rc]||{}).length;
          console.log('✅ JSON valid before gzip');
          console.log('📚 Roll Codes:', Object.keys(data).length);
          console.log('🎓 Students:', total);
          "

      - name: Re-compress JSON to GZ
        if: always()
        run: |
          echo "===== COMPRESSING TO GZ ====="
          rm -f bseb-12th-full-result-2026.json.gz
          gzip -c bseb-12th-full-result-2026.json > bseb-12th-full-result-2026.json.gz

          echo "===== GZ CHECK ====="
          gzip -t bseb-12th-full-result-2026.json.gz
          ls -lh bseb-12th-full-result-2026.json.gz

      - name: Final Validation
        if: always()
        run: |
          echo "===== JSON FILE SIZE ====="
          du -h bseb-12th-full-result-2026.json || true

          echo "===== GZ FILE SIZE ====="
          du -h bseb-12th-full-result-2026.json.gz || true

          echo "===== GZ STUDENT COUNT ====="
          gunzip -c bseb-12th-full-result-2026.json.gz | node -e "
          let input='';
          process.stdin.on('data',d=>input+=d);
          process.stdin.on('end',()=>{
            const data=JSON.parse(input);
            let total=0;
            for(const rc of Object.keys(data)) total += Object.keys(data[rc]||{}).length;
            console.log('📚 Roll Codes:', Object.keys(data).length);
            console.log('🎓 Students:', total);
          });
          "

      - name: Commit and Push Only GZ
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git restore --staged . || true
          git reset || true

          git add bseb-12th-full-result-2026.json.gz
          git status

          git commit -m "Update BSEB recheck data" || echo "No changes to commit"
          git pull --rebase origin main || true
          git push

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bseb-recheck-output
          path: |
            bseb-12th-full-result-2026.json
            bseb-12th-full-result-2026.json.gz
