name: Final JSON Fix (Recover + Correct Structure)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Recover + Fix JSON
        run: |
          python <<EOF
          import json

          FILE_PATH = "BSEB 10TH RESULT/Bseb 10th Result 2026/sheikhpura-24-bseb-10th-full-result-2026.json"

          print("📂 Reading raw file...")

          with open(FILE_PATH, "r", encoding="utf-8") as f:
              raw = f.read()

          # =========================
          # STEP 1: RECOVER VALID JSON
          # =========================
          stack = []
          end_index = 0

          for i, ch in enumerate(raw):
              if ch == "{":
                  stack.append("{")
              elif ch == "}":
                  if stack:
                      stack.pop()
                  if not stack:
                      end_index = i + 1
                      break

          clean_raw = raw[:end_index]

          print("✅ JSON safely recovered")

          data = json.loads(clean_raw)

          # =========================
          # STEP 2: FIX STRUCTURE
          # =========================
          def save_json(file, data):
              with open(file, "w", encoding="utf-8") as f:
                  f.write("{\n")

                  rc_keys = sorted(data.keys(), key=lambda x: int(x))

                  for rc_i, rc in enumerate(rc_keys):
                      f.write(f'  "{rc}": {{\n')

                      students = data[rc]
                      rn_keys = sorted(students.keys(), key=lambda x: int(x))

                      for rn_i, rn in enumerate(rn_keys):
                          student = students[rn].copy()
                          subjects = student.pop("subjects", [])

                          # Convert subjects to one-line
                          subjects_lines = [
                              json.dumps(s, ensure_ascii=False, separators=(",", ":"))
                              for s in subjects
                          ]

                          # Convert student JSON (without closing })
                          student_json = json.dumps(student, ensure_ascii=False, indent=6)
                          lines = student_json.splitlines()[:-1]  # remove last }

                          for i, line in enumerate(lines):
                              if i == 0:
                                  f.write(f'    "{rn}": {line}\n')
                              else:
                                  f.write(f'    {line}\n')

                          # ✅ ADD subjects INSIDE
                          f.write('      ,"subjects": [\n')
                          for si, s in enumerate(subjects_lines):
                              comma = "," if si < len(subjects_lines) - 1 else ""
                              f.write(f'        {s}{comma}\n')
                          f.write('      ]\n')

                          f.write("    }")

                          if rn_i < len(rn_keys) - 1:
                              f.write(",\n")
                          else:
                              f.write("\n")

                      f.write("  }")
                      if rc_i < len(rc_keys) - 1:
                          f.write(",")
                      f.write("\n")

                  f.write("}\n")

          save_json(FILE_PATH, data)

          print("🎉 FULL FIX DONE (STRUCTURE + FORMAT)")
          EOF

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "actions@github.com"

          git add .
          git commit -m "Final JSON fix (recover + correct structure)" || echo "No changes"
          git push
