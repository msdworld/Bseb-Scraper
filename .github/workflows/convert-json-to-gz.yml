name: Check GZ File

on:
  workflow_dispatch:

jobs:
  check-gz:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Show Files
        run: |
          echo "===== ROOT FILES ====="
          ls -lah

      - name: Check GZ File
        run: |
          if [ ! -f bseb-12th-full-result-2026.json.gz ]; then
            echo "❌ GZ file not found"
            exit 1
          fi

          echo "===== GZ FILE SIZE ====="
          ls -lh bseb-12th-full-result-2026.json.gz

          echo "===== TRY UNZIP ====="
          gunzip -c bseb-12th-full-result-2026.json.gz | head -n 20 || true

          echo "===== CHECK IF VALID JSON ====="
          gunzip -c bseb-12th-full-result-2026.json.gz > test.json || true

          node -e "
          const fs = require('fs');
          try {
            const txt = fs.readFileSync('test.json','utf8');
            JSON.parse(txt);
            console.log('✅ VALID JSON');
          } catch(e) {
            console.log('❌ INVALID JSON:', e.message);
          }
          "
