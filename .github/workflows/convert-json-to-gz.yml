name: Fix Single District JSON

on:
  workflow_dispatch:

jobs:
  fix-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Fix JSON File
        run: |
          python << 'EOF'
          import os
          import re
          import json

          FILE_PATH = "BSEB 10TH RESULT/Bseb 10th Result 2026/sheikhpura-24-bseb-10th-full-result-2026.json"

          print(f"📂 Fixing file: {FILE_PATH}")

          if not os.path.exists(FILE_PATH):
              print("❌ File not found")
              exit()

          with open(FILE_PATH, "r", encoding="utf-8") as f:
              content = f.read()

          # 🔥 Fix broken subjects placement
          content = re.sub(
              r'\}\s*,\s*"subjects"\s*:\s*(\[[^\]]*\])',
              r',"subjects": \1\n    }',
              content
          )

          # 🔥 Remove trailing commas
          content = re.sub(r",\s*}", "}", content)

          # Try parsing
          try:
              data = json.loads(content)
              print("✅ JSON fixed successfully")
          except Exception as e:
              print("❌ Still invalid:", e)
              exit()

          # Save clean formatted JSON
          with open(FILE_PATH, "w", encoding="utf-8") as f:
              json.dump(data, f, ensure_ascii=False, indent=2)

          print("💾 File saved successfully")
          EOF

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add "BSEB 10TH RESULT/Bseb 10th Result 2026/sheikhpura-24-bseb-10th-full-result-2026.json"

          git commit -m "Fix single district JSON" || echo "No changes"

          git pull --rebase origin main || true
          git push
