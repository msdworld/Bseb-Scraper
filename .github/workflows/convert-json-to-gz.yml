name: Deep Fix Single District JSON

on:
  workflow_dispatch:

jobs:
  fix-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Deep Fix JSON
        run: |
          python << 'EOF'
          import os
          import json
          import re

          FILE_PATH = "BSEB 10TH RESULT/Bseb 10th Result 2026/sheikhpura-24-bseb-10th-full-result-2026.json"

          print(f"📂 Processing: {FILE_PATH}")

          if not os.path.exists(FILE_PATH):
              print("❌ File not found")
              exit()

          with open(FILE_PATH, "r", encoding="utf-8") as f:
              raw = f.read()

          # Extract rollCode blocks
          fixed_data = {}

          rollcode_blocks = re.findall(r'"(\d{5})"\s*:\s*{(.*?)}\s*(?=,\s*"\d{5}"|\s*})', raw, re.S)

          for rc, block in rollcode_blocks:
              students = {}

              # Extract student blocks
              student_matches = re.findall(
                  r'"(\d+)"\s*:\s*{(.*?)}\s*,?\s*"subjects"\s*:\s*(\[[^\]]*\])',
                  block,
                  re.S
              )

              for roll_no, student_part, subjects_part in student_matches:
                  try:
                      student_json = "{" + student_part + "}"
                      student_data = json.loads(student_json)

                      subjects_data = json.loads(subjects_part)

                      student_data["subjects"] = subjects_data

                      students[roll_no] = student_data

                  except Exception as e:
                      print(f"⚠️ Skipped student {roll_no}: {e}")

              if students:
                  fixed_data[rc] = students

          if not fixed_data:
              print("❌ Could not recover data")
              exit()

          # Save clean JSON
          with open(FILE_PATH, "w", encoding="utf-8") as f:
              json.dump(fixed_data, f, ensure_ascii=False, indent=2)

          print("✅ FULL RECOVERY DONE")
          EOF

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add "BSEB 10TH RESULT/Bseb 10th Result 2026/sheikhpura-24-bseb-10th-full-result-2026.json"

          git commit -m "Deep fix district JSON" || echo "No changes"

          git pull --rebase origin main || true
          git push
