name: Fix Corrupted District File (Strong Fix)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-json:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: 🔧 Deep Fix JSON
        run: |
          cat << 'PYCODE' > fix.py
          import os
          import json

          FILE_PATH = "BSEB 10TH RESULT/Bseb 10th Result 2026/sheikhpura-24-bseb-10th-full-result-2026.json"

          if not os.path.exists(FILE_PATH):
              print("❌ File not found")
              exit(1)

          print("📂 Reading file...")
          with open(FILE_PATH, "r", encoding="utf-8") as f:
              raw = f.read()

          # 🔥 Extract ONLY first valid JSON object
          stack = []
          end_index = -1

          for i, ch in enumerate(raw):
              if ch == "{":
                  stack.append("{")
              elif ch == "}":
                  if stack:
                      stack.pop()
                      if not stack:
                          end_index = i
                          break

          if end_index == -1:
              print("❌ Could not find valid JSON block")
              exit(1)

          cleaned_raw = raw[:end_index + 1]

          try:
              data = json.loads(cleaned_raw)
              print("✅ JSON recovered safely")
          except Exception as e:
              print("❌ Still invalid JSON:", e)
              exit(1)

          # 🔥 Remove last student (corruption source)
          removed = 0
          for rc in data:
              students = data[rc]
              if not students:
                  continue

              roll_nos = sorted(students.keys(), key=lambda x: int(x))
              last_rn = roll_nos[-1]

              del students[last_rn]
              removed += 1

          print(f"🗑 Removed last student from {removed} roll codes")

          # 🔥 Save CLEAN JSON
          with open(FILE_PATH, "w", encoding="utf-8") as f:
              json.dump(data, f, ensure_ascii=False, indent=2)

          print("💾 File fixed & saved")
          PYCODE

          python fix.py

      - name: 🚀 Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "Deep fix corrupted JSON" || echo "No changes"

          git pull --rebase origin main
          git push
