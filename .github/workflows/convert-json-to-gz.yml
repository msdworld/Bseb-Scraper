name: Fix Corrupted District File (Final Safe Fix)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-json:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: 🔧 Fix JSON Properly
        run: |
          cat << 'PYCODE' > fix.py
          import os
          import json

          FILE_PATH = "BSEB 10TH RESULT/Bseb 10th Result 2026/sheikhpura-24-bseb-10th-full-result-2026.json"

          print("📂 Reading file...")

          with open(FILE_PATH, "r", encoding="utf-8") as f:
              raw = f.read()

          # ✅ Extract valid JSON block
          stack = []
          end_index = -1

          for i, ch in enumerate(raw):
              if ch == "{":
                  stack.append("{")
              elif ch == "}":
                  if stack:
                      stack.pop()
                      if not stack:
                          end_index = i
                          break

          cleaned_raw = raw[:end_index + 1]

          data = json.loads(cleaned_raw)
          print("✅ JSON recovered")

          fixed = {}
          removed_invalid = 0

          for rc, students in data.items():
              fixed[rc] = {}

              for key, value in students.items():

                  # ✅ keep ONLY numeric roll numbers
                  if not str(key).isdigit():
                      removed_invalid += 1
                      continue

                  fixed[rc][key] = value

          print(f"🧹 Removed invalid keys: {removed_invalid}")

          # ✅ Save clean JSON
          with open(FILE_PATH, "w", encoding="utf-8") as f:
              json.dump(fixed, f, ensure_ascii=False, indent=2)

          print("💾 File fully cleaned & fixed")
          PYCODE

          python fix.py

      - name: 🚀 Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "Fix corrupted JSON structure" || echo "No changes"

          git pull --rebase origin main
          git push
