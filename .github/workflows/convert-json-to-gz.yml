name: Fix JSON Format (Final)

on:
  workflow_dispatch:

permissions:
  contents: write   # ✅ THIS FIXES 403 ERROR

jobs:
  fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fix JSON format
        run: |
          python <<EOF
          import json
          import re
          import os

          FILE_PATH = "BSEB 10TH RESULT/Bseb 10th Result 2026/sheikhpura-24-bseb-10th-full-result-2026.json"

          print("Processing:", FILE_PATH)

          with open(FILE_PATH, "r", encoding="utf-8") as f:
              raw = f.read()

          # -------- STEP 1: RECOVER VALID JSON --------
          stack = []
          end = 0

          for i, ch in enumerate(raw):
              if ch == "{":
                  stack.append("{")
              elif ch == "}":
                  if stack:
                      stack.pop()
                  if not stack:
                      end = i + 1
                      break

          clean = raw[:end]

          data = json.loads(clean)

          # -------- STEP 2: SAVE IN COMPACT SUBJECT FORMAT --------
          def save_json(file, data):
              with open(file, "w", encoding="utf-8") as f:
                  f.write("{\n")

                  rc_keys = sorted(data.keys(), key=lambda x: int(x))

                  for rc_i, rc in enumerate(rc_keys):
                      f.write(f'  "{rc}": {{\n')

                      students = data[rc]
                      rn_keys = sorted(students.keys(), key=lambda x: int(x))

                      for rn_i, rn in enumerate(rn_keys):
                          student = students[rn].copy()

                          subjects = student.pop("subjects", [])

                          # 🔥 compact subjects (ONE LINE EACH OBJECT)
                          subjects_lines = []
                          for sub in subjects:
                              subjects_lines.append(json.dumps(sub, ensure_ascii=False, separators=(",", ":")))

                          # student basic
                          student_json = json.dumps(student, ensure_ascii=False, indent=6)
                          lines = student_json.splitlines()

                          for i, line in enumerate(lines):
                              if i == 0:
                                  f.write(f'    "{rn}": {line}\n')
                              else:
                                  f.write(f'    {line}\n')

                          # 🔥 subjects block EXACT like your scraper
                          f.write(f'      ,"subjects": [\n')
                          for si, s in enumerate(subjects_lines):
                              comma = "," if si < len(subjects_lines) - 1 else ""
                              f.write(f'        {s}{comma}\n')
                          f.write("      ]\n")

                          f.write("    }")

                          if rn_i < len(rn_keys) - 1:
                              f.write(",\n")
                          else:
                              f.write("\n")

                      f.write("  }")
                      if rc_i < len(rc_keys) - 1:
                          f.write(",")
                      f.write("\n")

                  f.write("}\n")

          save_json(FILE_PATH, data)

          print("✅ PERFECT FORMAT DONE")
          EOF

      - name: Commit changes
        run: |
          git config --global user.name "Manish"
          git config --global user.email "you@example.com"
          git add .
          git commit -m "Fix JSON to scraper format" || echo "No changes"
          git push
