name: Compress updated JSON
        run: |
          set -e

          if [ ! -f "bseb-12th-full-result-2026.json" ]; then
            echo "❌ JSON missing before compression"
            exit 1
          fi

          echo "===== JSON SIZE BEFORE GZIP ====="
          ls -lh bseb-12th-full-result-2026.json

          gzip -c bseb-12th-full-result-2026.json > bseb-12th-full-result-2026.json.gz

          echo "===== GZ SIZE AFTER GZIP ====="
          ls -lh bseb-12th-full-result-2026.json.gz
          
      - name: Validate JSON + GZ before commit
        run: |
          node - <<'EOF'
          const fs = require("fs");
          const zlib = require("zlib");

          const jsonFile = "bseb-12th-full-result-2026.json";
          const gzFile = "bseb-12th-full-result-2026.json.gz";

          if (!fs.existsSync(jsonFile)) {
            console.error("❌ JSON file missing");
            process.exit(1);
          }

          if (!fs.existsSync(gzFile)) {
            console.error("❌ GZ file missing");
            process.exit(1);
          }

          const raw = fs.readFileSync(jsonFile, "utf8");
          const data = JSON.parse(raw);

          let total = 0;
          for (const rc of Object.keys(data)) {
            total += Object.keys(data[rc] || {}).length;
          }

          console.log("✅ JSON valid before commit");
          console.log("📚 Roll Codes:", Object.keys(data).length);
          console.log("🎓 Students:", total);

          if (total < 300000) {
            console.error("❌ Safety stop: student count too small");
            process.exit(1);
          }

          const gzRaw = fs.readFileSync(gzFile);
          const unzipped = zlib.gunzipSync(gzRaw).toString("utf8");
          const gzData = JSON.parse(unzipped);

          let gzTotal = 0;
          for (const rc of Object.keys(gzData)) {
            gzTotal += Object.keys(gzData[rc] || {}).length;
          }

          console.log("✅ GZ valid before commit");
          console.log("🎓 GZ Students:", gzTotal);

          if (gzTotal !== total) {
            console.error("❌ JSON and GZ student count mismatch");
            process.exit(1);
          }
          EOF

      - name: Commit and Push GZ + Progress
        if: always()
        run: |
          set -e

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          rm -f bseb-12th-full-result-2026.json

          git add bseb-12th-full-result-2026.json.gz progress.txt script.js .github/workflows/recheck.yml
          git status

          git commit -m "Update BSEB recheck progress" || echo "No changes to commit"
          git pull --rebase origin main || true
          git push

      - name: Upload fresh backup artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bseb-full-result-data
          path: |
            bseb-12th-full-result-2026.json
            bseb-12th-full-result-2026.json.gz
            progress.txt
