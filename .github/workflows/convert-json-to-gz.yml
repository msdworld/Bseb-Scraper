name: Fix JSON Perfect Structure

on:
  workflow_dispatch:

permissions:
  contents: write   # ✅ THIS FIXES 403 ERROR

jobs:
  fix:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fix JSON
        run: |
          python <<EOF
          import json
          import os

          FILE_PATH = "BSEB 10TH RESULT/Bseb 10th Result 2026/sheikhpura-24-bseb-10th-full-result-2026.json"

          print("Processing:", FILE_PATH)

          with open(FILE_PATH, "r", encoding="utf-8") as f:
              data = json.load(f)

          def save_json(file, data):
              with open(file, "w", encoding="utf-8") as f:
                  f.write("{\n")

                  rc_keys = sorted(data.keys(), key=lambda x: int(x))

                  for rc_i, rc in enumerate(rc_keys):
                      f.write(f'  "{rc}": {{\n')

                      students = data[rc]
                      rn_keys = sorted(students.keys(), key=lambda x: int(x))

                      for rn_i, rn in enumerate(rn_keys):
                          student = students[rn].copy()

                          subjects = student.pop("subjects", [])

                          # Convert subjects → one-line objects
                          subjects_lines = [
                              json.dumps(s, ensure_ascii=False, separators=(",", ":"))
                              for s in subjects
                          ]

                          # Convert student JSON WITHOUT closing }
                          student_json = json.dumps(student, ensure_ascii=False, indent=6)
                          lines = student_json.splitlines()

                          # REMOVE last closing brace
                          lines = lines[:-1]

                          for i, line in enumerate(lines):
                              if i == 0:
                                  f.write(f'    "{rn}": {line}\n')
                              else:
                                  f.write(f'    {line}\n')

                          # ✅ ADD subjects INSIDE object
                          f.write(f'      ,"subjects": [\n')
                          for si, s in enumerate(subjects_lines):
                              comma = "," if si < len(subjects_lines) - 1 else ""
                              f.write(f'        {s}{comma}\n')
                          f.write("      ]\n")

                          # CLOSE student properly
                          f.write("    }")

                          if rn_i < len(rn_keys) - 1:
                              f.write(",\n")
                          else:
                              f.write("\n")

                      f.write("  }")
                      if rc_i < len(rc_keys) - 1:
                          f.write(",")
                      f.write("\n")

                  f.write("}\n")

          save_json(FILE_PATH, data)

          print("✅ PERFECT STRUCTURE FIXED")
          EOF

      - name: Commit
        run: |
          git config --global user.name "Manish"
          git config --global user.email "you@example.com"

          git add .
          git commit -m "Fix JSON structure correctly" || echo "No changes"
          git push
