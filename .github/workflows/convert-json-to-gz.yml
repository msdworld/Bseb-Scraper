name: BSEB Full Recheck Tempo

on:
workflow_dispatch:

jobs:
recheck:
runs-on: ubuntu-latest

permissions:
contents: write
actions: read

steps:
- name: Checkout Repo (NO LFS)
uses: actions/checkout@v4
with:
lfs: false
persist-credentials: true

- name: Setup Node.js
uses: actions/setup-node@v4
with:
node-version: 20

- name: Install Dependencies
run: npm install

- name: Install unzip + jq
run: |
         sudo apt-get update
         sudo apt-get install -y unzip jq

     - name: Download REAL artifact by ID
env:
GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
ARTIFACT_ID: 6269148355
run: |
         set -e

         echo "===== DOWNLOADING ARTIFACT ====="
         echo "Artifact ID: $ARTIFACT_ID"

         curl -L \
           -H "Authorization: Bearer $GH_TOKEN" \
           -H "Accept: application/vnd.github+json" \
           "https://api.github.com/repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID/zip" \
           -o artifact.zip

         echo "===== ARTIFACT ZIP ====="
         ls -lh artifact.zip

     - name: Extract artifact
run: |
         set -e
         mkdir -p artifact_data
         unzip -o artifact.zip -d artifact_data

         echo "===== ARTIFACT CONTENTS ====="
         find artifact_data -type f | sort || true

     - name: Restore real JSON
run: |
         set -e

         if [ -f "artifact_data/bseb-12th-full-result-2026.json" ]; then
           cp artifact_data/bseb-12th-full-result-2026.json bseb-12th-full-result-2026.json
           echo "✅ Restored JSON directly from artifact"
         elif [ -f "artifact_data/bseb-12th-full-result-2026.json.gz" ]; then
           cp artifact_data/bseb-12th-full-result-2026.json.gz bseb-12th-full-result-2026.json.gz
           gunzip -f bseb-12th-full-result-2026.json.gz
           echo "✅ Restored JSON from artifact GZ"
         else
           echo "❌ No real JSON found inside artifact"
           exit 1
         fi

     - name: Validate restored JSON
run: |
         node - <<'EOF'
         const fs = require("fs");

         const file = "bseb-12th-full-result-2026.json";

         if (!fs.existsSync(file)) {
           console.error("❌ JSON file missing");
           process.exit(1);
         }

         const raw = fs.readFileSync(file, "utf8");

         if (raw.startsWith("version https://git-lfs.github.com/spec/v1")) {
           console.error("❌ This is still an LFS pointer, not real JSON");
           process.exit(1);
         }

         try {
           const data = JSON.parse(raw);
           const rollCodes = Object.keys(data);
           let total = 0;

           for (const rc of rollCodes) {
             total += Object.keys(data[rc] || {}).length;
           }

           console.log("✅ JSON valid");
           console.log("📚 Roll Codes:", rollCodes.length);
           console.log("🎓 Students:", total);

           if (total < 300000) {
             console.error("❌ Loaded data looks too small. Stopping for safety.");
             process.exit(1);
           }
         } catch (e) {
           console.error("❌ JSON parse failed:", e.message);
           process.exit(1);
         }
         EOF

     - name: Run Recheck Script
run: node script.js

- name: Compress updated JSON
run: |
         set -e

         if [ ! -f "bseb-12th-full-result-2026.json" ]; then
           echo "❌ JSON missing before compression"
           exit 1
         fi

         echo "===== JSON SIZE BEFORE GZIP ====="
         ls -lh bseb-12th-full-result-2026.json

         gzip -c bseb-12th-full-result-2026.json > bseb-12th-full-result-2026.json.gz

         echo "===== GZ SIZE AFTER GZIP ====="
         ls -lh bseb-12th-full-result-2026.json.gz

     - name: Validate JSON + GZ before commit
run: |
         node - <<'EOF'
         const fs = require("fs");
         const zlib = require("zlib");

         const jsonFile = "bseb-12th-full-result-2026.json";
         const gzFile = "bseb-12th-full-result-2026.json.gz";

         if (!fs.existsSync(jsonFile)) {
           console.error("❌ JSON file missing");
           process.exit(1);
         }

         if (!fs.existsSync(gzFile)) {
           console.error("❌ GZ file missing");
           process.exit(1);
         }

         const raw = fs.readFileSync(jsonFile, "utf8");
         const data = JSON.parse(raw);

         let total = 0;
         for (const rc of Object.keys(data)) {
           total += Object.keys(data[rc] || {}).length;
         }

         console.log("✅ JSON valid before commit");
         console.log("📚 Roll Codes:", Object.keys(data).length);
         console.log("🎓 Students:", total);

         if (total < 300000) {
           console.error("❌ Safety stop: student count too small");
           process.exit(1);
         }

         const gzRaw = fs.readFileSync(gzFile);
         const unzipped = zlib.gunzipSync(gzRaw).toString("utf8");
         const gzData = JSON.parse(unzipped);

         let gzTotal = 0;
         for (const rc of Object.keys(gzData)) {
           gzTotal += Object.keys(gzData[rc] || {}).length;
         }

         console.log("✅ GZ valid before commit");
         console.log("🎓 GZ Students:", gzTotal);

         if (gzTotal !== total) {
           console.error("❌ JSON and GZ student count mismatch");
           process.exit(1);
         }
         EOF

      - name: Show Final Stats
      - name: Show Saved Files
if: always()
run: |
          echo "===== ROOT FILES ====="
          echo "===== FILE LIST ====="
         ls -lah

         echo "===== JSON FILE SIZE ====="
          du -h bseb-12th-full-result-2026.json || true
          [ -f bseb-12th-full-result-2026.json ] && du -h bseb-12th-full-result-2026.json || echo "No raw JSON present"

         echo "===== GZ FILE SIZE ====="
          du -h bseb-12th-full-result-2026.json.gz || true
          [ -f bseb-12th-full-result-2026.json.gz ] && du -h bseb-12th-full-result-2026.json.gz || echo "No GZ present"

         echo "===== PROGRESS ====="
          cat progress.txt || true
          cat progress.txt || echo "No progress file"

     - name: Commit and Push Results
if: always()
run: |
         git config --global user.name "github-actions[bot]"
         git config --global user.email "github-actions[bot]@users.noreply.github.com"

          [ -f bseb-12th-full-result-2026.json ] && git add bseb-12th-full-result-2026.json
          # IMPORTANT: never push raw JSON (too big)
          git restore --staged bseb-12th-full-result-2026.json || true
          git checkout -- bseb-12th-full-result-2026.json || true
          rm -f bseb-12th-full-result-2026.json || true

          # Add only safe files
         [ -f bseb-12th-full-result-2026.json.gz ] && git add bseb-12th-full-result-2026.json.gz
         [ -f progress.txt ] && git add progress.txt
         [ -f script.js ] && git add script.js

         git status

         git commit -m "Update BSEB recheck data" || echo "No changes to commit"
         git pull --rebase origin main || true
         git push

          

     - name: Upload fresh backup artifact
if: always()
uses: actions/upload-artifact@v4
with:
name: bseb-full-result-data
path: |
           bseb-12th-full-result-2026.json
           bseb-12th-full-result-2026.json.gz
           progress.txt
