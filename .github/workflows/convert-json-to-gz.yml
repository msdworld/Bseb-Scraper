 - name: Fix Corrupted District File
  run: |
    python << 'EOF'
    import os
    import json

    FILE_PATH = "BSEB 10TH RESULT/Bseb 10th Result 2026/siwan-92-bseb-10th-full-result-2026.json"

    if not os.path.exists(FILE_PATH):
        print("❌ File not found")
        exit()

    print("📂 Reading file...")

    raw = open(FILE_PATH, "r", encoding="utf-8").read()

    # Cut till last valid }
    last_brace = raw.rfind("}")
    if last_brace == -1:
        print("❌ Invalid JSON completely")
        exit()

    cleaned_raw = raw[:last_brace + 1]

    try:
        data = json.loads(cleaned_raw)
        print("✅ JSON recovered")
    except Exception as e:
        print("❌ Still invalid JSON:", e)
        exit()

    # Remove last student from each roll code
    removed = 0
    for rc in data:
        students = data[rc]
        if not students:
            continue

        roll_nos = sorted(students.keys(), key=lambda x: int(x))
        last_rn = roll_nos[-1]

        del students[last_rn]
        removed += 1

    print(f"🗑 Removed last student from {removed} roll codes")

    # Save in correct format
    def save_json(file, data):
        roll_codes = sorted(data.keys(), key=lambda x: int(x))

        with open(file, "w", encoding="utf-8") as f:
            f.write("{\n")

            for rc_i, rc in enumerate(roll_codes):
                f.write(f'  "{rc}": {{\n')

                students = data[rc]
                roll_nos = sorted(students.keys(), key=lambda x: int(x))

                for rn_i, rn in enumerate(roll_nos):
                    student = students[rn].copy()

                    subjects = student.get("subjects", [])
                    subjects_str = json.dumps(subjects, ensure_ascii=False, separators=(",", ":"))

                    student.pop("subjects", None)

                    student_json = json.dumps(student, ensure_ascii=False, indent=6)
                    lines = student_json.splitlines()

                    for i, line in enumerate(lines):
                        if i == 0:
                            f.write(f'    "{rn}": {line}\n')
                        else:
                            f.write(f'    {line}\n')

                    f.write(f'      ,"subjects": {subjects_str}\n')
                    f.write("    }")

                    if rn_i < len(roll_nos) - 1:
                        f.write(",\n")
                    else:
                        f.write("\n")

                f.write("  }")
                if rc_i < len(roll_codes) - 1:
                    f.write(",")
                f.write("\n")

            f.write("}\n")

    print("💾 Saving cleaned file...")
    save_json(FILE_PATH, data)

    print("🎉 FILE FIXED SUCCESSFULLY")
    EOF
