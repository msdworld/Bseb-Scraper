name: Recover 12th Master File

on:
  workflow_dispatch:

jobs:
  recover:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          lfs: false

      - name: Show Initial Files
        run: |
          echo "===== ROOT BEFORE RECOVERY ====="
          ls -lah
          echo "===== OLD FILE CHECK ====="
          ls -lh bseb-12th-full-result-2026.json.gz || true
          du -h bseb-12th-full-result-2026.json.gz || true

      - name: Download Artifact ZIP
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          echo "===== DOWNLOADING ARTIFACT ====="

          curl -L \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/artifacts/6299169859/zip" \
            -o artifact.zip

          echo "===== ZIP DOWNLOADED ====="
          ls -lh artifact.zip
          du -h artifact.zip

      - name: Extract Artifact
        run: |
          set -e

          mkdir -p artifact_data
          unzip -o artifact.zip -d artifact_data

          echo "===== EXTRACTED FILES ====="
          find artifact_data -type f | sort

      - name: Restore Master GZ
        run: |
          set -e

          FOUND_FILE=$(find artifact_data -type f -name "bseb-12th-full-result-2026.json.gz" | head -n 1)

          if [ -z "$FOUND_FILE" ]; then
            echo "❌ Could not find bseb-12th-full-result-2026.json.gz inside artifact"
            exit 1
          fi

          cp "$FOUND_FILE" bseb-12th-full-result-2026.json.gz

          echo "===== RESTORED FILE ====="
          ls -lh bseb-12th-full-result-2026.json.gz
          du -h bseb-12th-full-result-2026.json.gz

      - name: Validate Restored File
        run: |
          node - <<'EOF'
          const fs = require("fs");
          const zlib = require("zlib");

          const file = "bseb-12th-full-result-2026.json.gz";

          if (!fs.existsSync(file)) {
            console.error("❌ Restored file missing");
            process.exit(1);
          }

          const raw = fs.readFileSync(file);
          console.log("📦 Restored GZ Size:", raw.length, "bytes");

          if (raw.length === 0) {
            console.error("❌ Restored file is 0 bytes");
            process.exit(1);
          }

          const isGzip = raw.length >= 2 && raw[0] === 0x1f && raw[1] === 0x8b;

          let text = "";
          if (isGzip) {
            console.log("🗜️ Valid gzip detected");
            text = zlib.gunzipSync(raw).toString("utf8");
          } else {
            console.log("⚠️ File is not gzip, treating as plain JSON");
            text = raw.toString("utf8");
          }

          const data = JSON.parse(text);

          let total = 0;
          for (const rc of Object.keys(data)) {
            total += Object.keys(data[rc] || {}).length;
          }

          console.log("✅ Master file valid");
          console.log("📚 Roll Codes:", Object.keys(data).length);
          console.log("🎓 Students:", total);
          EOF

      - name: Commit Restored File
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add bseb-12th-full-result-2026.json.gz
          git add .github/workflows/extract-12th-district.yml

          git status
          git commit -m "Recover valid 12th master file from artifact" || echo "No changes to commit"
          git pull --rebase origin main || true
          git push

      - name: Cleanup
        if: always()
        run: |
          rm -rf artifact.zip artifact_data || true
