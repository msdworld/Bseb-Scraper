name: Extract 12th District Data

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          lfs: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Dependency
        run: pip install ijson

      - name: Show Initial Files
        run: |
          echo "===== ROOT ====="
          ls -lah
          echo "===== 12TH FOLDER ====="
          ls -lah "BSEB 12TH RESULT/Bseb 12th Result 2026" || true
          echo "===== MASTER FILE ====="
          ls -lh bseb-12th-full-result-2026.json.gz || true
          du -h bseb-12th-full-result-2026.json.gz || true

      - name: Extract District Prefix
        run: |
          python << 'EOF'
          import os
          import gzip
          import json
          import ijson

          # =========================
          # CONFIG
          # =========================
          MASTER_GZ = "bseb-12th-full-result-2026.json.gz"

          BASE_DIR = "BSEB 12TH RESULT/Bseb 12th Result 2026"

          # CHANGE THESE EACH TIME
          DISTRICT_PREFIX = "13"
          DISTRICT_NAME = "arabhojpur"

          OUTPUT_JSON = os.path.join(
              BASE_DIR,
              f"{DISTRICT_NAME}-{DISTRICT_PREFIX}-bseb-12th-full-result-2026.json"
          )

          # =========================
          # HELPERS
          # =========================
          def count_students(data):
              total = 0
              for rc in data:
                  total += len(data[rc] or {})
              return total

          def save_custom_json(file_path, data):
              roll_codes = sorted(data.keys(), key=lambda x: int(x))

              with open(file_path, "w", encoding="utf-8") as f:
                  f.write("{\n")

                  for rc_index, roll_code in enumerate(roll_codes):
                      students = data.get(roll_code, {})
                      roll_nos = sorted(students.keys(), key=lambda x: int(x))

                      f.write(f'  "{roll_code}": {{\n')

                      for rn_index, roll_no in enumerate(roll_nos):
                          student = students[roll_no]
                          student_json = json.dumps(student, ensure_ascii=False, indent=6)
                          lines = student_json.splitlines()

                          for line_index, line in enumerate(lines):
                              if line_index == 0:
                                  f.write(f'    "{roll_no}": {line}\n')
                              else:
                                  f.write(f'    {line}\n')

                          if rn_index < len(roll_nos) - 1:
                              f.write(",\n")

                      f.write("\n  }")
                      if rc_index < len(roll_codes) - 1:
                          f.write(",")
                      f.write("\n")

                  f.write("}\n")

          # =========================
          # START
          # =========================
          if not os.path.exists(MASTER_GZ):
              print(f"❌ Master GZ file not found: {MASTER_GZ}")
              raise SystemExit(1)

          os.makedirs(BASE_DIR, exist_ok=True)

          print("📂 Streaming master file...")
          print("🔍 Filtering district prefix:", DISTRICT_PREFIX)

          district_data = {}
          matched_roll_codes = 0
          extracted_students = 0

          with gzip.open(MASTER_GZ, "rb") as f:
              for roll_code, value in ijson.kvitems(f, ""):
                  if not str(roll_code).startswith(DISTRICT_PREFIX):
                      continue

                  district_data[str(roll_code)] = value
                  matched_roll_codes += 1
                  extracted_students += len(value or {})

                  if matched_roll_codes % 25 == 0:
                      print(f"📦 Roll Codes Extracted: {matched_roll_codes} | Students: {extracted_students}")

          print("💾 Saving district file...")
          save_custom_json(OUTPUT_JSON, district_data)

          print("✅ District extraction complete")
          print("🏙️ District:", DISTRICT_NAME)
          print("🔢 Prefix:", DISTRICT_PREFIX)
          print("📚 Roll Codes:", matched_roll_codes)
          print("🎓 Students:", extracted_students)
          print("📄 Saved to:", OUTPUT_JSON)
          EOF

      - name: Validate Extracted District File
        run: |
          python << 'EOF'
          import os
          import json

          BASE_DIR = "BSEB 12TH RESULT/Bseb 12th Result 2026"
          file = os.path.join(BASE_DIR, "{DISTRICT_NAME}-{DISTRICT_PREFIX}-bseb-12th-full-result-2026.json")

          if not os.path.exists(file):
              print("❌ Extracted district file not found")
              raise SystemExit(1)

          with open(file, "r", encoding="utf-8") as f:
              data = json.load(f)

          total = 0
          for rc in data:
              total += len(data[rc] or {})

          print("✅ District JSON valid")
          print("📚 Roll Codes:", len(data))
          print("🎓 Students:", total)

          roll_codes = sorted(data.keys(), key=lambda x: int(x))
          print("🔹 First Roll Code:", roll_codes[0] if roll_codes else "none")
          print("🔹 Last Roll Code:", roll_codes[-1] if roll_codes else "none")
          EOF

      - name: Show Final Files
        if: always()
        run: |
          echo "===== FINAL 12TH FOLDER ====="
          ls -lah "BSEB 12TH RESULT/Bseb 12th Result 2026" || true

          echo "===== FILE SIZE ====="
          du -h "BSEB 12TH RESULT/Bseb 12th Result 2026/patna-11-bseb-12th-full-result-2026.json" || true

      - name: Commit District File
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          find "BSEB 12TH RESULT/Bseb 12th Result 2026" -maxdepth 1 -name "*.json" -print0 | xargs -0 git add
          git add ".github/workflows/extract-12th-district.yml"

          git status
          git commit -m "Extract 12th district data" || echo "No changes to commit"
          git pull --rebase origin main || true
          git push
