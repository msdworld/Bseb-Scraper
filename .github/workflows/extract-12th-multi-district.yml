name: Check 12th Master vs District Totals

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Dependency
        run: pip install ijson

      - name: Show Files
        run: |
          echo "===== ROOT ====="
          ls -lah

          echo "===== 12TH DISTRICT FOLDER ====="
          ls -lah "BSEB 12TH RESULT/Bseb 12th Result 2026" || true

          echo "===== MASTER FILE ====="
          ls -lh bseb-12th-full-result-2026.json.gz || true
          du -h bseb-12th-full-result-2026.json.gz || true

      - name: Count Master + District Totals
        run: |
          python << 'EOF'
          import os
          import gzip
          import json
          import ijson

          MASTER_GZ = "bseb-12th-full-result-2026.json.gz"
          DISTRICT_DIR = "BSEB 12TH RESULT/Bseb 12th Result 2026"

          # =========================
          # COUNT MASTER FILE
          # =========================
          if not os.path.exists(MASTER_GZ):
              print(f"❌ Master file not found: {MASTER_GZ}")
              raise SystemExit(1)

          print("📂 Counting MASTER file...")
          master_roll_codes = 0
          master_students = 0

          with gzip.open(MASTER_GZ, "rb") as f:
              for roll_code, value in ijson.kvitems(f, ""):
                  master_roll_codes += 1
                  master_students += len(value or {})

                  if master_roll_codes % 100 == 0:
                      print(f"📦 Master Progress | Roll Codes: {master_roll_codes} | Students: {master_students}")

          print("\n✅ MASTER COUNT COMPLETE")
          print("📚 Master Roll Codes:", master_roll_codes)
          print("🎓 Master Students:", master_students)

          # =========================
          # COUNT DISTRICT FILES
          # =========================
          print("\n📂 Counting DISTRICT files...")

          if not os.path.exists(DISTRICT_DIR):
              print(f"❌ District folder not found: {DISTRICT_DIR}")
              raise SystemExit(1)

          district_files = sorted([
              f for f in os.listdir(DISTRICT_DIR)
              if f.endswith(".json") and "bseb-12th-full-result-2026" in f
          ])

          if not district_files:
              print("❌ No district JSON files found")
              raise SystemExit(1)

          total_district_roll_codes = 0
          total_district_students = 0

          for file_name in district_files:
              file_path = os.path.join(DISTRICT_DIR, file_name)

              with open(file_path, "r", encoding="utf-8") as f:
                  data = json.load(f)

              roll_code_count = len(data)
              student_count = sum(len(data[rc] or {}) for rc in data)

              total_district_roll_codes += roll_code_count
              total_district_students += student_count

              print(f"📄 {file_name}")
              print(f"   📚 Roll Codes: {roll_code_count}")
              print(f"   🎓 Students: {student_count}")

          print("\n✅ DISTRICT TOTAL COUNT COMPLETE")
          print("📚 District Total Roll Codes:", total_district_roll_codes)
          print("🎓 District Total Students:", total_district_students)

          # =========================
          # FINAL COMPARISON
          # =========================
          print("\n==============================")
          print("FINAL COMPARISON")
          print("==============================")
          print("📚 Master Roll Codes:   ", master_roll_codes)
          print("📚 District Roll Codes: ", total_district_roll_codes)
          print("🎓 Master Students:     ", master_students)
          print("🎓 District Students:   ", total_district_students)

          roll_code_diff = master_roll_codes - total_district_roll_codes
          student_diff = master_students - total_district_students

          print("\n📊 Difference")
          print("📚 Roll Code Difference:", roll_code_diff)
          print("🎓 Student Difference:", student_diff)

          if roll_code_diff == 0 and student_diff == 0:
              print("\n🎉 PERFECT MATCH — ALL DATA EXTRACTED CORRECTLY")
          else:
              print("\n⚠️ MISMATCH FOUND — SOME DISTRICT FILES MAY BE MISSING OR INCOMPLETE")
          EOF
