name: Extract 12th Multi District Data

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Extraction Dependencies
        run: npm install stream-json

      - name: Show Initial Files
        run: |
          echo "===== ROOT ====="
          ls -lah

          echo "===== MASTER FILE ====="
          ls -lh bseb-12th-full-result-2026.json.gz || true
          du -h bseb-12th-full-result-2026.json.gz || true

          echo "===== 12TH FOLDER ====="
          ls -lah "BSEB 12TH RESULT/Bseb 12th Result 2026" || true

      - name: Extract Multiple Districts
        run: |
          node - <<'EOF'
          const fs = require("fs");
          const path = require("path");
          const zlib = require("zlib");

          const { parser } = require("stream-json");
          const { streamObject } = require("stream-json/streamers/StreamObject");

          // =========================
          // CONFIG
          // =========================
          const BASE_DIR = "BSEB 12TH RESULT/Bseb 12th Result 2026";
          const INPUT_GZ = "bseb-12th-full-result-2026.json.gz";

          // =========================
          // EDIT THIS MAP ONLY
          // =========================
          const DISTRICT_MAP = {
            "16": "kaimurbhabua",
            "17": "patna2",
            "21": "gaya",
            "22": "jahanabad",
            "23": "nawadah",
            "24": "aurangabad",
            "25": "arwal",
            "31": "muzaffarpur",
            "32": "sitamarhi",
            "33": "vaishali"
          };

          // =========================
          // HELPERS
          // =========================
          function ensureDir(dir) {
            if (!fs.existsSync(dir)) fs.mkdirSync(dir, { recursive: true });
          }

          function getDistrictKey(rollCode) {
            const code = String(rollCode);
            for (const prefix of Object.keys(DISTRICT_MAP)) {
              if (code.startsWith(prefix)) return prefix;
            }
            return null;
          }

          function saveCustomJSON(file, data) {
            const rollCodes = Object.keys(data).sort((a, b) => Number(a) - Number(b));
            const lines = [];
            lines.push("{");

            rollCodes.forEach((rollCode, idx) => {
              const students = data[rollCode] || {};
              const rollNos = Object.keys(students).sort((a, b) => Number(a) - Number(b));

              lines.push(`  ${JSON.stringify(rollCode)}: {`);

              rollNos.forEach((rollNo, i) => {
                const student = students[rollNo];
                const json = JSON.stringify(student, null, 6)
                  .split("\n")
                  .map((line, lineIndex) => {
                    if (lineIndex === 0) {
                      return `    ${JSON.stringify(rollNo)}: ${line}`;
                    }
                    return `    ${line}`;
                  })
                  .join("\n");

                lines.push(json + (i < rollNos.length - 1 ? "," : ""));
              });

              lines.push(`  }${idx < rollCodes.length - 1 ? "," : ""}`);
            });

            lines.push("}");
            fs.writeFileSync(file, lines.join("\n"), "utf8");
          }

          function countStudents(data) {
            let total = 0;
            for (const rc of Object.keys(data)) {
              total += Object.keys(data[rc] || {}).length;
            }
            return total;
          }

          // =========================
          // START
          // =========================
          ensureDir(BASE_DIR);

          if (!fs.existsSync(INPUT_GZ)) {
            console.error("❌ Master GZ file not found:");
            console.error(INPUT_GZ);
            process.exit(1);
          }

          const gzStat = fs.statSync(INPUT_GZ);
          console.log("📦 Master GZ found");
          console.log("📏 Size:", gzStat.size, "bytes");

          const districtData = {};
          const districtStats = {};

          for (const [prefix, name] of Object.entries(DISTRICT_MAP)) {
            districtData[prefix] = {};
            districtStats[prefix] = {
              name,
              rollCodes: 0,
              students: 0
            };
          }

          console.log("📂 Streaming master file...");
          let processedRollCodes = 0;

          const gunzip = zlib.createGunzip();
          const pipeline = fs.createReadStream(INPUT_GZ)
            .pipe(gunzip)
            .pipe(parser())
            .pipe(streamObject());

          pipeline.on("data", ({ key, value }) => {
            const rollCode = String(key);
            const prefix = getDistrictKey(rollCode);
            if (!prefix) return;

            districtData[prefix][rollCode] = value;
            districtStats[prefix].rollCodes++;
            districtStats[prefix].students += Object.keys(value || {}).length;

            processedRollCodes++;

            if (processedRollCodes % 100 === 0) {
              console.log(`📚 Processed matched roll codes: ${processedRollCodes}`);
            }
          });

          pipeline.on("end", () => {
            console.log("✅ Streaming complete");
            console.log("");

            for (const [prefix, name] of Object.entries(DISTRICT_MAP)) {
              const data = districtData[prefix];
              const stats = districtStats[prefix];

              const outputFile = path.join(
                BASE_DIR,
                `${name}-${prefix}-bseb-12th-full-result-2026.json`
              );

              saveCustomJSON(outputFile, data);

              console.log(`✅ Saved: ${name}-${prefix}`);
              console.log(`   📚 Roll Codes: ${stats.rollCodes}`);
              console.log(`   🎓 Students: ${stats.students}`);
              console.log(`   📄 File: ${outputFile}`);
              console.log("");
            }

            console.log("🎉 ALL DISTRICT EXTRACTION COMPLETED");
          });

          pipeline.on("error", (err) => {
            console.error("❌ Stream parse failed:", err.message);
            process.exit(1);
          });
          EOF

      - name: Validate Extracted Files
        run: |
          node - <<'EOF'
          const fs = require("fs");
          const path = require("path");

          const BASE_DIR = "BSEB 12TH RESULT/Bseb 12th Result 2026";

          const DISTRICT_MAP = {
            "16": "kaimurbhabua",
            "17": "patna2",
            "21": "gaya",
            "22": "jahanabad",
            "23": "nawadah",
            "24": "aurangabad",
            "25": "arwal",
            "31": "muzaffarpur",
            "32": "sitamarhi",
            "33": "vaishali"
          };

          for (const [prefix, name] of Object.entries(DISTRICT_MAP)) {
            const file = path.join(BASE_DIR, `${name}-${prefix}-bseb-12th-full-result-2026.json`);

            if (!fs.existsSync(file)) {
              console.log(`❌ Missing: ${file}`);
              continue;
            }

            const data = JSON.parse(fs.readFileSync(file, "utf8"));
            let total = 0;
            for (const rc of Object.keys(data)) {
              total += Object.keys(data[rc] || {}).length;
            }

            const rollCodes = Object.keys(data).sort((a, b) => Number(a) - Number(b));

            console.log(`✅ ${name}-${prefix}`);
            console.log(`   📚 Roll Codes: ${rollCodes.length}`);
            console.log(`   🎓 Students: ${total}`);
            console.log(`   🔹 First: ${rollCodes[0] || "none"}`);
            console.log(`   🔹 Last: ${rollCodes[rollCodes.length - 1] || "none"}`);
            console.log("");
          }
          EOF

      - name: Show Final Files
        if: always()
        run: |
          echo "===== FINAL 12TH FOLDER ====="
          ls -lah "BSEB 12TH RESULT/Bseb 12th Result 2026" || true

          echo "===== DISTRICT FILE SIZES ====="
          find "BSEB 12TH RESULT/Bseb 12th Result 2026" -maxdepth 1 -name "*.json" -exec du -h {} \;

      - name: Commit District Files
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          find "BSEB 12TH RESULT/Bseb 12th Result 2026" -maxdepth 1 -name "*.json" -print0 | xargs -0 git add
          git add ".github/workflows/extract-12th-multi-district.yml"

          git status
          git commit -m "Extract 12th multi-district data" || echo "No changes to commit"
          git pull --rebase origin main || true
          git push
