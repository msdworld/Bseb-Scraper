name: Recheck 12th District Result

on:
  workflow_dispatch:

jobs:
  recheck:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Show Initial Files
        run: |
          echo "===== ROOT ====="
          ls -lah

          echo "===== 12TH FOLDER ====="
          ls -lah "BSEB 12TH RESULT/Bseb 12th Result 2026" || true

      - name: Run Recheck Script
        run: |
          node "BSEB 12TH RESULT/Bseb 12th Result 2026/script.js"

      - name: Validate District JSON
        if: always()
        run: |
          node << 'EOF'
          const fs = require("fs");
          const path = require("path");

          const scriptPath = "BSEB 12TH RESULT/Bseb 12th Result 2026/script.js";
          const script = fs.readFileSync(scriptPath, "utf8");

          const prefixMatch = script.match(/const DISTRICT_PREFIX = "([^"]+)"/);
          const nameMatch = script.match(/const DISTRICT_NAME = "([^"]+)"/);

          if (!prefixMatch || !nameMatch) {
            console.log("❌ Could not read district config from script.js");
            process.exit(1);
          }

          const DISTRICT_PREFIX = prefixMatch[1];
          const DISTRICT_NAME = nameMatch[1];

          const file = path.join(
            "BSEB 12TH RESULT/Bseb 12th Result 2026",
            `${DISTRICT_NAME}-${DISTRICT_PREFIX}-bseb-12th-full-result-2026.json`
          );

          if (!fs.existsSync(file)) {
            console.log("❌ District file not found:", file);
            process.exit(1);
          }

          const data = JSON.parse(fs.readFileSync(file, "utf8"));

          let total = 0;
          for (const rc of Object.keys(data)) {
            total += Object.keys(data[rc] || {}).length;
          }

          console.log("✅ District JSON valid");
          console.log("🏙️ District:", DISTRICT_NAME);
          console.log("🔢 Prefix:", DISTRICT_PREFIX);
          console.log("📚 Roll Codes:", Object.keys(data).length);
          console.log("🎓 Students:", total);
          EOF

      - name: Show Final Files
        if: always()
        run: |
          echo "===== FINAL 12TH FOLDER ====="
          ls -lah "BSEB 12TH RESULT/Bseb 12th Result 2026" || true

          echo "===== DISTRICT FILE SIZE ====="
          node << 'EOF'
          const fs = require("fs");
          const path = require("path");

          const scriptPath = "BSEB 12TH RESULT/Bseb 12th Result 2026/script.js";
          const script = fs.readFileSync(scriptPath, "utf8");

          const prefixMatch = script.match(/const DISTRICT_PREFIX = "([^"]+)"/);
          const nameMatch = script.match(/const DISTRICT_NAME = "([^"]+)"/);

          if (prefixMatch && nameMatch) {
            const DISTRICT_PREFIX = prefixMatch[1];
            const DISTRICT_NAME = nameMatch[1];
            const file = path.join(
              "BSEB 12TH RESULT/Bseb 12th Result 2026",
              `${DISTRICT_NAME}-${DISTRICT_PREFIX}-bseb-12th-full-result-2026.json`
            );

            if (fs.existsSync(file)) {
              const stat = fs.statSync(file);
              console.log("📄 File:", file);
              console.log("📦 Size Bytes:", stat.size);
            } else {
              console.log("⚠️ File not found:", file);
            }
          }
          EOF

      - name: Commit and Push
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Clean npm junk so git stays clean
          rm -rf node_modules

          # Rebuild package files if npm changed them accidentally
          git restore package.json package-lock.json || true

          # Detect district file from script.js
          DISTRICT_PREFIX=$(grep 'const DISTRICT_PREFIX =' "BSEB 12TH RESULT/Bseb 12th Result 2026/script.js" | sed 's/.*= "\(.*\)".*/\1/')
          DISTRICT_NAME=$(grep 'const DISTRICT_NAME =' "BSEB 12TH RESULT/Bseb 12th Result 2026/script.js" | sed 's/.*= "\(.*\)".*/\1/')

          DISTRICT_FILE="BSEB 12TH RESULT/Bseb 12th Result 2026/${DISTRICT_NAME}-${DISTRICT_PREFIX}-bseb-12th-full-result-2026.json"

          echo "===== COMMIT TARGET ====="
          echo "$DISTRICT_FILE"

          [ -f "$DISTRICT_FILE" ] && git add "$DISTRICT_FILE"
          [ -f "BSEB 12TH RESULT/Bseb 12th Result 2026/script.js" ] && git add "BSEB 12TH RESULT/Bseb 12th Result 2026/script.js"
          [ -f ".github/workflows/recheck-12th-district.yml" ] && git add ".github/workflows/recheck-12th-district.yml"

          git status

          git commit -m "Recheck 12th district result (${DISTRICT_NAME}-${DISTRICT_PREFIX})" || echo "No changes to commit"

          git pull --rebase origin main || true
          git push || true
