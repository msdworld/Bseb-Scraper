name: Recheck 12th District Result

on:
  workflow_dispatch:

env:
  DISTRICT_PREFIX: "11"
  DISTRICT_NAME: "patna"

jobs:
  recheck:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install axios cheerio

      - name: Show Initial Files
        run: |
          echo "===== ROOT ====="
          ls -lah

          echo "===== DISTRICT CONFIG ====="
          echo "DISTRICT_PREFIX=$DISTRICT_PREFIX"
          echo "DISTRICT_NAME=$DISTRICT_NAME"

          echo "===== 12TH FOLDER ====="
          ls -lah "BSEB 12TH RESULT/Bseb 12th Result 2026" || true

          echo "===== DISTRICT FILE ====="
          ls -lh "BSEB 12TH RESULT/Bseb 12th Result 2026/${DISTRICT_NAME}-${DISTRICT_PREFIX}-bseb-12th-full-result-2026.json" || true
          du -h "BSEB 12TH RESULT/Bseb 12th Result 2026/${DISTRICT_NAME}-${DISTRICT_PREFIX}-bseb-12th-full-result-2026.json" || true

          echo "===== COLLEGE LIST ====="
          ls -lh bseb-12th-college-list-2026.json || true
          du -h bseb-12th-college-list-2026.json || true

      - name: Validate Existing District File
        run: |
          node - <<'EOF'
          const fs = require("fs");
          const path = require("path");

          const DISTRICT_PREFIX = process.env.DISTRICT_PREFIX;
          const DISTRICT_NAME = process.env.DISTRICT_NAME;
          const file = path.join(
            "BSEB 12TH RESULT/Bseb 12th Result 2026",
            `${DISTRICT_NAME}-${DISTRICT_PREFIX}-bseb-12th-full-result-2026.json`
          );

          if (!fs.existsSync(file)) {
            console.log("⚠️ District file not found. Fresh district file will be created.");
            process.exit(0);
          }

          try {
            const data = JSON.parse(fs.readFileSync(file, "utf8"));
            let total = 0;
            for (const rc of Object.keys(data)) {
              total += Object.keys(data[rc] || {}).length;
            }

            console.log("✅ Existing district JSON valid");
            console.log("📚 Roll Codes:", Object.keys(data).length);
            console.log("🎓 Students:", total);
          } catch (e) {
            console.error("❌ District file invalid:", e.message);
            process.exit(1);
          }
          EOF

      - name: Run District Recheck Script
        run: node "BSEB 12TH RESULT/Bseb 12th Result 2026/script.js"

      - name: Validate Final District File
        if: always()
        run: |
          node - <<'EOF'
          const fs = require("fs");
          const path = require("path");

          const DISTRICT_PREFIX = process.env.DISTRICT_PREFIX;
          const DISTRICT_NAME = process.env.DISTRICT_NAME;
          const file = path.join(
            "BSEB 12TH RESULT/Bseb 12th Result 2026",
            `${DISTRICT_NAME}-${DISTRICT_PREFIX}-bseb-12th-full-result-2026.json`
          );

          if (!fs.existsSync(file)) {
            console.error("❌ Final district file missing");
            process.exit(1);
          }

          const data = JSON.parse(fs.readFileSync(file, "utf8"));
          let total = 0;
          for (const rc of Object.keys(data)) {
            total += Object.keys(data[rc] || {}).length;
          }

          console.log("✅ Final district JSON valid");
          console.log("📚 Roll Codes:", Object.keys(data).length);
          console.log("🎓 Students:", total);

          const rollCodes = Object.keys(data).sort((a, b) => Number(a) - Number(b));
          console.log("🔹 First Roll Code:", rollCodes[0] || "none");
          console.log("🔹 Last Roll Code:", rollCodes[rollCodes.length - 1] || "none");
          EOF

      - name: Show Final Files
        if: always()
        run: |
          echo "===== FINAL 12TH FOLDER ====="
          ls -lah "BSEB 12TH RESULT/Bseb 12th Result 2026" || true

          echo "===== DISTRICT FILE SIZE ====="
          ls -lh "BSEB 12TH RESULT/Bseb 12th Result 2026/${DISTRICT_NAME}-${DISTRICT_PREFIX}-bseb-12th-full-result-2026.json" || true
          du -h "BSEB 12TH RESULT/Bseb 12th Result 2026/${DISTRICT_NAME}-${DISTRICT_PREFIX}-bseb-12th-full-result-2026.json" || true

      - name: Commit and Push
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add "BSEB 12TH RESULT/Bseb 12th Result 2026/${DISTRICT_NAME}-${DISTRICT_PREFIX}-bseb-12th-full-result-2026.json"
          git add "BSEB 12TH RESULT/Bseb 12th Result 2026/script.js"
          git add ".github/workflows/recheck-12th-district.yml"

          git status

          git commit -m "Recheck 12th district result (${DISTRICT_NAME}-${DISTRICT_PREFIX})" || echo "No changes to commit"

          git pull --rebase origin main || true
          git push
