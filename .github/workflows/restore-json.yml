- name: Deep JSON Validation Test
  run: |
    node - <<'EOF'
    const fs = require("fs");

    const FILE = "bseb-12th-full-result-2026.json";

    if (!fs.existsSync(FILE)) {
      console.log("❌ JSON file not found");
      process.exit(1);
    }

    const raw = fs.readFileSync(FILE, "utf8");

    console.log("===== FILE SIZE =====");
    const stats = fs.statSync(FILE);
    console.log(`Bytes: ${stats.size}`);
    console.log(`MB: ${(stats.size / 1024 / 1024).toFixed(2)} MB`);

    let data;
    try {
      data = JSON.parse(raw);
      console.log("✅ JSON PARSE: SUCCESS");
    } catch (err) {
      console.log("❌ JSON PARSE FAILED");
      console.log(err.message);
      process.exit(1);
    }

    const rollCodes = Object.keys(data).sort((a, b) => Number(a) - Number(b));
    console.log(`📚 Total Roll Codes: ${rollCodes.length}`);

    let totalStudents = 0;
    let lastStudents = [];

    for (const rollCode of rollCodes) {
      const students = data[rollCode] || {};
      const rollNos = Object.keys(students).sort((a, b) => Number(a) - Number(b));

      totalStudents += rollNos.length;

      for (const rollNo of rollNos) {
        lastStudents.push({
          rollCode,
          rollNo,
          student: students[rollNo]
        });

        if (lastStudents.length > 2) {
          lastStudents.shift();
        }
      }
    }

    console.log(`👨‍🎓 Total Students Saved: ${totalStudents}`);

    console.log("\n===== LAST 2 STUDENTS =====");
    if (lastStudents.length === 0) {
      console.log("⚠️ No students found in file");
    } else {
      lastStudents.forEach((entry, i) => {
        console.log(`\n[${i + 1}] Roll Code: ${entry.rollCode} | Roll No: ${entry.rollNo}`);
        console.log(JSON.stringify(entry.student, null, 2));
      });
    }

    console.log("\n===== LAST 10 ROLL CODES SUMMARY =====");
    const last10RollCodes = rollCodes.slice(-10);
    for (const rc of last10RollCodes) {
      const count = Object.keys(data[rc] || {}).length;
      console.log(`${rc}: ${count} students`);
    }
    EOF
