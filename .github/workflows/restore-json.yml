name: Restore Old JSON File

on:
  workflow_dispatch:

jobs:
  restore:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Backup current broken JSON
        run: |
          cp bseb-12th-full-result-2026.json bseb-12th-full-result-2026-broken-backup.json || true

      - name: Restore old JSON from good commit
        run: |
          GOOD_COMMIT="2d906bf8264fcc8d33d881437d4c724bf6f86f69"
          git checkout $GOOD_COMMIT -- bseb-12th-full-result-2026.json

      - name: Show restored file info
        run: |
          echo "===== FILE SIZE ====="
          du -h bseb-12th-full-result-2026.json || echo "File not found"

          echo "===== FILE START ====="
          head -n 20 bseb-12th-full-result-2026.json || echo "Could not read file"

          echo "===== FILE END ====="
          tail -n 20 bseb-12th-full-result-2026.json || echo "Could not read file"

      - name: Commit and Push Restored File
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add bseb-12th-full-result-2026.json bseb-12th-full-result-2026-broken-backup.json
          git commit -m "Restore correct BSEB full result JSON" || echo "No changes to commit"
          git push
