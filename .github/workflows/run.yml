name: BSEB Full Result Scraper

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          lfs: true

      - name: Setup Git LFS
        run: |
          git lfs install
          git lfs track "bseb-12th-full-result-2026.json"
          cat .gitattributes || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run Script
        run: node script.js

      - name: Show Saved Files (Light)
        if: always()
        run: |
          echo "===== ROOT FILES ====="
          ls -lh
          echo ""
          echo "===== JSON FILE SIZE ====="
          du -h bseb-12th-full-result-2026.json || echo "JSON not found"
          echo ""
          echo "===== JSON START ====="
          head -n 20 bseb-12th-full-result-2026.json || echo "JSON not found"
          echo ""
          echo "===== JSON END ====="
          tail -n 20 bseb-12th-full-result-2026.json || echo "JSON not found"

      - name: Commit and Push Results
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add .gitattributes
          git add bseb-12th-full-result-2026.json

          git commit -m "Update BSEB full result data" || echo "No changes to commit"

          git pull --rebase origin main || true
          git push

      - name: Upload Result Files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bseb-full-result-data
          path: |
            bseb-12th-full-result-2026.json
