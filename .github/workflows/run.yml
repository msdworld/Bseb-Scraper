name: BSEB Debug One Student

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install axios cheerio

      - name: Run Debug Script
        run: node script.js

      - name: Show Debug Files
        if: always()
        run: |
          echo "===== FILE LIST ====="
          ls -la
          echo "===== debug-default.html ====="
          head -200 debug-default.html || echo "debug-default.html missing"
          echo "===== debug-result.html ====="
          head -200 debug-result.html || echo "debug-result.html missing"

      - name: Upload Debug Files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bseb-debug-files
          path: |
            debug-default.html
            debug-result.html
