name: BSEB Full Recheck GZ

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: write

    steps:
      - name: Checkout Repo WITHOUT LFS
        uses: actions/checkout@v4
        with:
          lfs: false
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Show Existing Files
        run: |
          echo "===== ROOT FILES ====="
          ls -lh
          echo
          echo "===== GZ FILE ====="
          ls -lh bseb-12th-full-result-2026.json.gz || echo "No GZ file found"
          echo
          echo "===== PROGRESS FILE ====="
          cat progress.txt || echo "No progress file yet"

      - name: Validate GZ Before Run
        run: |
          node - <<'EOF'
          const fs = require("fs");
          const zlib = require("zlib");

          const file = "bseb-12th-full-result-2026.json.gz";

          if (!fs.existsSync(file)) {
            console.error("❌ GZ file not found");
            process.exit(1);
          }

          try {
            const text = zlib.gunzipSync(fs.readFileSync(file)).toString("utf8");
            const data = JSON.parse(text);

            let total = 0;
            for (const rc of Object.keys(data)) {
              total += Object.keys(data[rc] || {}).length;
            }

            console.log("✅ GZ VALID BEFORE RUN");
            console.log("📚 Roll Codes:", Object.keys(data).length);
            console.log("🎓 Students:", total);
          } catch (e) {
            console.error("❌ GZ validation failed:", e.message);
            process.exit(1);
          }
          EOF

      - name: Run Recheck Script
        run: node script.js

      - name: Validate GZ After Run
        if: always()
        run: |
          node - <<'EOF'
          const fs = require("fs");
          const zlib = require("zlib");

          const file = "bseb-12th-full-result-2026.json.gz";

          if (!fs.existsSync(file)) {
            console.error("❌ GZ file missing after run");
            process.exit(1);
          }

          try {
            const text = zlib.gunzipSync(fs.readFileSync(file)).toString("utf8");
            const data = JSON.parse(text);

            let total = 0;
            for (const rc of Object.keys(data)) {
              total += Object.keys(data[rc] || {}).length;
            }

            console.log("✅ GZ VALID AFTER RUN");
            console.log("📚 Roll Codes:", Object.keys(data).length);
            console.log("🎓 Students:", total);
          } catch (e) {
            console.error("❌ GZ validation failed after run:", e.message);
            process.exit(1);
          }
          EOF

      - name: Show Final Files
        if: always()
        run: |
          echo "===== FINAL FILES ====="
          ls -lh
          echo
          echo "===== GZ FILE SIZE ====="
          ls -lh bseb-12th-full-result-2026.json.gz || true
          echo
          echo "===== PROGRESS ====="
          cat progress.txt || true

      - name: Commit and Push Updated GZ
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add bseb-12th-full-result-2026.json.gz progress.txt
          git commit -m "Update BSEB recheck data (gz)" || echo "No changes to commit"
          git pull --rebase origin main || true
          git push

      - name: Upload Backup Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bseb-recheck-gz-backup
          path: |
            bseb-12th-full-result-2026.json.gz
            progress.txt
