name: Debug One Student (InterBiharBoard)

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Show files before run
        run: ls -la

      - name: Run debug script
        run: node script.js

      - name: Upload debug/output files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-files
          path: |
            *.html
            *.json
            *.txt
            *.log
          if-no-files-found: warn
