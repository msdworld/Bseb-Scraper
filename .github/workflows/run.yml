name: BSEB Full Recheck

on:
  workflow_dispatch:

jobs:
  recheck:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Show Initial Files
        run: |
          echo "===== INITIAL FILES ====="
          ls -lah

      - name: Restore Real JSON from GZ
        run: |
          if [ -f bseb-12th-full-result-2026.json.gz ]; then
            echo "===== RESTORING JSON FROM GZ ====="
            gunzip -c bseb-12th-full-result-2026.json.gz > bseb-12th-full-result-2026.json

            node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('bseb-12th-full-result-2026.json', 'utf8'));
            let total = 0;
            for (const rc of Object.keys(data)) total += Object.keys(data[rc] || {}).length;
            console.log('✅ JSON valid');
            console.log('📚 Roll Codes:', Object.keys(data).length);
            console.log('🎓 Students:', total);
            "
          else
            echo "⚠️ No GZ file found. Starting fresh."
            echo "{}" > bseb-12th-full-result-2026.json
          fi

      - name: Run Recheck Script
        run: node script.js

      - name: Validate JSON Before Compress
        if: always()
        run: |
          node -e "
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('bseb-12th-full-result-2026.json', 'utf8'));
          let total = 0;
          for (const rc of Object.keys(data)) total += Object.keys(data[rc] || {}).length;
          console.log('✅ JSON valid before commit');
          console.log('📚 Roll Codes:', Object.keys(data).length);
          console.log('🎓 Students:', total);
          "

      - name: Compress JSON to GZ
        if: always()
        run: |
          gzip -c bseb-12th-full-result-2026.json > bseb-12th-full-result-2026.json.gz

      - name: Validate GZ
        if: always()
        run: |
          gunzip -c bseb-12th-full-result-2026.json.gz > test.json

          node -e "
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('test.json', 'utf8'));
          let total = 0;
          for (const rc of Object.keys(data)) total += Object.keys(data[rc] || {}).length;
          console.log('✅ GZ valid before commit');
          console.log('🎓 GZ Students:', total);
          "

          rm -f test.json

      - name: Show Final Files
        if: always()
        run: |
          echo "===== FINAL FILES ====="
          ls -lah
          echo "===== JSON FILE SIZE ====="
          du -h bseb-12th-full-result-2026.json || true
          echo "===== GZ FILE SIZE ====="
          du -h bseb-12th-full-result-2026.json.gz || true
          echo "===== PROGRESS ====="
          cat progress.txt || true

      - name: Commit and Push Results
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Never push raw JSON (>100MB)
          git restore --staged bseb-12th-full-result-2026.json || true
          git checkout -- bseb-12th-full-result-2026.json || true
          rm -f bseb-12th-full-result-2026.json || true

          [ -f bseb-12th-full-result-2026.json.gz ] && git add bseb-12th-full-result-2026.json.gz
          [ -f progress.txt ] && git add progress.txt
          [ -f script.js ] && git add script.js
          [ -f .github/workflows/recheck.yml ] && git add .github/workflows/recheck.yml

          git status

          git commit -m "Update BSEB recheck data" || echo "No changes to commit"
          git pull --rebase origin main || true
          git push

      - name: Upload Backup Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bseb-recheck-backup
          path: |
            bseb-12th-full-result-2026.json.gz
            progress.txt
