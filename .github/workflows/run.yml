name: Check Real JSON File

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout WITHOUT LFS
        uses: actions/checkout@v4
        with:
          lfs: false
          fetch-depth: 1

      - name: Disable Git LFS hooks
        run: |
          git lfs uninstall || true
          git config --global filter.lfs.required false
          git config --global filter.lfs.smudge "git-lfs smudge --skip -- %f"
          git config --global filter.lfs.process "git-lfs filter-process --skip"

      - name: Show file details
        run: |
          echo "===== FILE INFO ====="
          ls -lh bseb-12th-full-result-2026.json || true

          echo "===== FIRST 10 LINES ====="
          head -n 10 bseb-12th-full-result-2026.json || true

          echo "===== CHECK TYPE ====="
          file bseb-12th-full-result-2026.json || true

      - name: Detect real JSON or LFS pointer
        run: |
          node - <<'EOF'
          const fs = require("fs");

          const file = "bseb-12th-full-result-2026.json";

          if (!fs.existsSync(file)) {
            console.log("❌ File not found");
            process.exit(1);
          }

          const raw = fs.readFileSync(file, "utf8").slice(0, 500);

          if (raw.includes("version https://git-lfs.github.com/spec")) {
            console.log("❌ THIS IS ONLY AN LFS POINTER, NOT REAL JSON");
            process.exit(1);
          }

          try {
            JSON.parse(fs.readFileSync(file, "utf8"));
            console.log("✅ REAL JSON FILE FOUND");
          } catch (e) {
            console.log("⚠️ File exists but is not valid JSON");
            console.log(e.message);
            process.exit(1);
          }
          EOF
