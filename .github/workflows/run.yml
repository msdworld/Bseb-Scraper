name: Count Roll Code Prefixes

on:
  workflow_dispatch:

jobs:
  count-prefixes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run prefix counter
        run: node script.js
