name: BSEB Recheck Full Result

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run Script
        run: node script.js

      - name: Show Saved Files
        if: always()
        run: |
          echo "===== ROOT FILES ====="
          ls -lah
          echo ""
          echo "===== JSON FILE SIZE ====="
          du -h bseb-12th-full-result-2026.json || echo "JSON not found"
          echo ""
          echo "===== PROGRESS ====="
          cat progress.txt || echo "Progress file not found"

      - name: Commit and Push Results
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add bseb-12th-full-result-2026.json progress.txt bseb-12th-full-result-2026.backup.json
          git commit -m "Update BSEB recheck data" || echo "No changes to commit"

          git pull --rebase origin main || true
          git push
