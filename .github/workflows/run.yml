name: BSEB Full Recheck

on:
  workflow_dispatch:

jobs:
  recheck:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Show Initial Files
        run: |
          echo "===== INITIAL FILES ====="
          ls -lah

      - name: Check Seen IDs File
        run: |
          echo "===== CHECK SEEN IDS FILE ====="
          ls -lh bseb-12th-seen-rollnos.txt || true
          du -h bseb-12th-seen-rollnos.txt || true
          wc -l bseb-12th-seen-rollnos.txt || true

      - name: Restore File2 JSON from GZ (if exists)
        run: |
          if [ -f bseb-12th-full-result-2026-2.json.gz ]; then
            echo "===== RESTORING FILE2 JSON FROM GZ ====="
            gunzip -c bseb-12th-full-result-2026-2.json.gz > bseb-12th-full-result-2026-2.json

            node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('bseb-12th-full-result-2026-2.json', 'utf8'));
            let total = 0;
            for (const rc of Object.keys(data)) total += Object.keys(data[rc] || {}).length;
            console.log('✅ File2 JSON valid');
            console.log('📚 Roll Codes:', Object.keys(data).length);
            console.log('🎓 File2 Students:', total);
            "
          else
            echo '⚠️ No File2 GZ found. Starting fresh.'
            echo '{}' > bseb-12th-full-result-2026-2.json
          fi

      - name: Run Recheck Script
        run: node script.js

      - name: Validate File2 JSON Before Compress
        if: always()
        run: |
          node -e "
          const fs = require('fs');
          const file = 'bseb-12th-full-result-2026-2.json';
          if (!fs.existsSync(file)) {
            console.log('⚠️ File2 JSON not found');
            process.exit(0);
          }
          const data = JSON.parse(fs.readFileSync(file, 'utf8'));
          let total = 0;
          for (const rc of Object.keys(data)) total += Object.keys(data[rc] || {}).length;
          console.log('✅ File2 JSON valid before commit');
          console.log('📚 Roll Codes:', Object.keys(data).length);
          console.log('🎓 File2 Students:', total);
          "

      - name: Compress File2 JSON to GZ
        if: always()
        run: |
          if [ -f bseb-12th-full-result-2026-2.json ]; then
            gzip -c bseb-12th-full-result-2026-2.json > bseb-12th-full-result-2026-2.json.gz
          fi

      - name: Validate File2 GZ
        if: always()
        run: |
          if [ -f bseb-12th-full-result-2026-2.json.gz ]; then
            gunzip -c bseb-12th-full-result-2026-2.json.gz > test.json

            node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('test.json', 'utf8'));
            let total = 0;
            for (const rc of Object.keys(data)) total += Object.keys(data[rc] || {}).length;
            console.log('✅ File2 GZ valid before commit');
            console.log('🎓 File2 GZ Students:', total);
            "

            rm -f test.json
          else
            echo "⚠️ File2 GZ not found"
          fi

      - name: Show Final Files
        if: always()
        run: |
          echo "===== FINAL FILES ====="
          ls -lah

          echo "===== FILE2 JSON FILE SIZE ====="
          du -h bseb-12th-full-result-2026-2.json || true

          echo "===== FILE2 GZ FILE SIZE ====="
          du -h bseb-12th-full-result-2026-2.json.gz || true

          echo "===== SEEN IDS FILE SIZE ====="
          du -h bseb-12th-seen-rollnos.txt || true
          wc -l bseb-12th-seen-rollnos.txt || true

          echo "===== PROGRESS ====="
          cat progress.txt || true

      - name: Commit and Push Results
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Never push raw JSON
          git restore --staged bseb-12th-full-result-2026-2.json || true
          git checkout -- bseb-12th-full-result-2026-2.json || true
          rm -f bseb-12th-full-result-2026-2.json || true

          [ -f bseb-12th-full-result-2026-2.json.gz ] && git add bseb-12th-full-result-2026-2.json.gz
          [ -f bseb-12th-seen-rollnos.txt ] && git add bseb-12th-seen-rollnos.txt
          [ -f progress.txt ] && git add progress.txt
          [ -f script.js ] && git add script.js
          [ -f .github/workflows/recheck.yml ] && git add .github/workflows/recheck.yml

          git status

          git commit -m "Update BSEB recheck data" || echo "No changes to commit"
          git pull --rebase origin main || true
          git push

      - name: Upload Backup Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bseb-recheck-backup
          path: |
            bseb-12th-full-result-2026-2.json.gz
            bseb-12th-seen-rollnos.txt
            progress.txt
