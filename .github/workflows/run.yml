name: BSEB Full Recheck

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Show Existing Files Before Run
        run: |
          echo "===== ROOT FILES ====="
          ls -lh
          echo "===== JSON ====="
          ls -lh bseb-12th-full-result-2026.json || true
          echo "===== GZ ====="
          ls -lh bseb-12th-full-result-2026.json.gz || true

      - name: Validate Existing Data
        run: |
          node - <<'EOF'
          const fs = require("fs");
          const zlib = require("zlib");

          const jsonFile = "bseb-12th-full-result-2026.json";
          const gzFile = "bseb-12th-full-result-2026.json.gz";

          let ok = false;

          if (fs.existsSync(gzFile)) {
            try {
              const raw = fs.readFileSync(gzFile);
              const txt = zlib.gunzipSync(raw).toString("utf8");
              const data = JSON.parse(txt);
              let total = 0;
              for (const rc of Object.keys(data)) total += Object.keys(data[rc] || {}).length;
              console.log(`✅ GZ valid | Roll Codes: ${Object.keys(data).length} | Students: ${total}`);
              ok = true;
            } catch (e) {
              console.log(`⚠️ GZ invalid: ${e.message}`);
            }
          }

          if (!ok && fs.existsSync(jsonFile)) {
            try {
              const data = JSON.parse(fs.readFileSync(jsonFile, "utf8"));
              let total = 0;
              for (const rc of Object.keys(data)) total += Object.keys(data[rc] || {}).length;
              console.log(`✅ JSON valid | Roll Codes: ${Object.keys(data).length} | Students: ${total}`);
              ok = true;
            } catch (e) {
              console.log(`⚠️ JSON invalid: ${e.message}`);
            }
          }

          if (!ok) {
            console.log("⚠️ No valid previous data found. Script will still run, but be careful.");
          }
          EOF

      - name: Run Recheck Script
        run: node script.js

      - name: Verify Output After Run
        if: always()
        run: |
          echo "===== OUTPUT FILES ====="
          ls -lh bseb-12th-full-result-2026.json* || true

          node - <<'EOF'
          const fs = require("fs");
          const zlib = require("zlib");

          const gzFile = "bseb-12th-full-result-2026.json.gz";

          if (!fs.existsSync(gzFile)) {
            console.log("❌ GZ file missing after run");
            process.exit(1);
          }

          const raw = fs.readFileSync(gzFile);
          const txt = zlib.gunzipSync(raw).toString("utf8");
          const data = JSON.parse(txt);

          let total = 0;
          for (const rc of Object.keys(data)) total += Object.keys(data[rc] || {}).length;

          console.log(`✅ Final GZ valid | Roll Codes: ${Object.keys(data).length} | Students: ${total}`);

          if (total === 0) {
            console.log("❌ Refusing empty dataset");
            process.exit(1);
          }
          EOF

      - name: Commit and Push Results
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add script.js
          git add bseb-12th-full-result-2026.json
          git add bseb-12th-full-result-2026.json.gz

          git commit -m "Recheck BSEB full result data" || echo "No changes to commit"
          git pull --rebase origin main || true
          git push

      - name: Upload Backup Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bseb-recheck-backup
          path: |
            bseb-12th-full-result-2026.json
            bseb-12th-full-result-2026.json.gz
