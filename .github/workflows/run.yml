name: BSEB Full Recheck

on:
  workflow_dispatch:

jobs:
  recheck:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Show Existing Files
        run: |
          echo "===== ROOT FILES ====="
          ls -lh
          echo ""
          echo "===== GZ FILE INFO ====="
          ls -lh bseb-12th-full-result-2026.json.gz || echo "No GZ found"
          echo ""
          echo "===== JSON FILE INFO ====="
          ls -lh bseb-12th-full-result-2026.json || echo "No JSON found"

      - name: Run Recheck Script
        run: node script.js

      - name: Verify Saved GZ
        if: always()
        run: |
          node -e "
          const fs = require('fs');
          const zlib = require('zlib');

          if (!fs.existsSync('bseb-12th-full-result-2026.json.gz')) {
            console.log('❌ GZ file not found');
            process.exit(1);
          }

          const raw = fs.readFileSync('bseb-12th-full-result-2026.json.gz');

          try {
            let txt;
            if (raw[0] === 0x1f && raw[1] === 0x8b) {
              txt = zlib.gunzipSync(raw).toString('utf8');
              console.log('✅ Real gzip detected');
            } else {
              txt = raw.toString('utf8');
              console.log('⚠️ File is plain JSON with .gz name');
            }

            const data = JSON.parse(txt);
            let total = 0;
            for (const rc of Object.keys(data)) total += Object.keys(data[rc] || {}).length;

            console.log('📚 Roll Codes:', Object.keys(data).length);
            console.log('🎓 Students:', total);
          } catch (e) {
            console.log('❌ Validation failed:', e.message);
            process.exit(1);
          }
          "

      - name: Commit and Push
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add bseb-12th-full-result-2026.json.gz
          git add bseb-12th-full-result-2026.json

          git commit -m "Update BSEB recheck data" || echo "No changes to commit"
          git pull --rebase origin main || true
          git push

      - name: Upload Backup Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bseb-recheck-backup
          path: |
            bseb-12th-full-result-2026.json.gz
            bseb-12th-full-result-2026.json
