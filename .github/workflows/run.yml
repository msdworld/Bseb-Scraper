name: BSEB Full Result Recheck

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repo (NO LFS)
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          lfs: false
          fetch-depth: 1

      - name: Disable Git LFS in runner
        run: |
          git lfs uninstall || true
          git config --global filter.lfs.required false
          git config --global filter.lfs.smudge "cat"
          git config --global filter.lfs.process ""

      - name: Show repo files before run
        run: |
          echo "===== ROOT FILES ====="
          ls -lh
          echo "===== GIT ATTRIBUTES ====="
          cat .gitattributes || echo "No .gitattributes found"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run Script
        run: node script.js

      - name: Show saved files after run
        if: always()
        run: |
          echo "===== ROOT FILES AFTER RUN ====="
          ls -lh
          echo "===== JSON FILE SIZE ====="
          du -h bseb-12th-full-result-2026.json || echo "JSON file not found"
          echo "===== PROGRESS FILE ====="
          cat progress.txt || echo "No progress file"

      - name: Clean unwanted files before commit
        if: always()
        run: |
          rm -rf node_modules
          rm -f package-lock.json

      - name: Commit and Push Results
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add bseb-12th-full-result-2026.json progress.txt script.js .github/workflows/*.yml
          git status

          git commit -m "Update BSEB full result recheck data" || echo "No changes to commit"

          git pull --rebase origin main || true
          git push

      - name: Upload Result Files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bseb-full-result-data
          path: |
            bseb-12th-full-result-2026.json
            progress.txt
