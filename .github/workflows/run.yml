name: BSEB Single Roll Code Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install axios cheerio

      - name: Run Test Script
        run: node script.js

      - name: Show Files
        if: always()
        run: |
          echo "===== FILES ====="
          ls -la
          echo "===== FOUND STUDENTS ====="
          cat test-found-students.json || echo "No file found"

      - name: Upload Debug Files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bseb-single-roll-test
          path: |
            test-found-students.json
            debug-default.html
            debug-sample-response.html
