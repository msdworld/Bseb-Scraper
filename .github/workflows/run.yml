name: BSEB Full Result Recheck

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          lfs: false
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Decompress Main JSON
        run: |
          if [ -f bseb-12th-full-result-2026.json.gz ]; then
            echo "📦 Extracting main JSON..."
            gunzip -c bseb-12th-full-result-2026.json.gz > bseb-12th-full-result-2026.json
            echo "✅ JSON extracted"
          else
            echo "{}" > bseb-12th-full-result-2026.json
            echo "⚠️ No compressed JSON found. Created empty JSON."
          fi

      - name: Run Script
        run: node script.js

      - name: Recompress Main JSON
        if: always()
        run: |
          if [ -f bseb-12th-full-result-2026.json ]; then
            echo "📦 Compressing updated JSON..."
            gzip -c bseb-12th-full-result-2026.json > bseb-12th-full-result-2026.json.gz
            echo "✅ JSON compressed"
          fi

      - name: Show Saved Files
        if: always()
        run: |
          echo "===== ROOT FILES ====="
          ls -lah
          echo ""
          echo "===== RAW JSON SIZE ====="
          du -sh bseb-12th-full-result-2026.json || echo "Raw JSON not found"
          echo ""
          echo "===== COMPRESSED JSON SIZE ====="
          du -sh bseb-12th-full-result-2026.json.gz || echo "Compressed JSON not found"
          echo ""
          echo "===== PROGRESS FILE ====="
          cat progress.txt || echo "Progress file not found"

      - name: Commit and Push Results
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add bseb-12th-full-result-2026.json.gz progress.txt .gitattributes
          git commit -m "Update BSEB full result data" || echo "No changes to commit"

          git pull --rebase origin main || true
          git push

      - name: Upload Debug Files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bseb-full-result-data
          path: |
            bseb-12th-full-result-2026.json
            bseb-12th-full-result-2026.json.gz
            progress.txt
