name: BSEB Full Result Recheck

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Restore JSON from GZ
        run: |
          if [ -f bseb-12th-full-result-2026.json.gz ]; then
            echo "📦 Found compressed master file"
            gunzip -c bseb-12th-full-result-2026.json.gz > bseb-12th-full-result-2026.json
            echo "✅ JSON restored from GZ"
          else
            echo "{}" > bseb-12th-full-result-2026.json
            echo "⚠️ No GZ found, created empty JSON"
          fi

          echo "===== JSON FILE SIZE ====="
          ls -lh bseb-12th-full-result-2026.json

          echo "===== JSON START ====="
          head -n 10 bseb-12th-full-result-2026.json || true

      - name: Run Script
        run: node script.js

      - name: Compress JSON back to GZ
        if: always()
        run: |
          if [ -f bseb-12th-full-result-2026.json ]; then
            gzip -c bseb-12th-full-result-2026.json > bseb-12th-full-result-2026.json.gz
            echo "✅ JSON compressed back to GZ"
          fi

      - name: Show Saved Files
        if: always()
        run: |
          echo "===== FILE LIST ====="
          ls -lah

          echo "===== GZ FILE SIZE ====="
          ls -lh bseb-12th-full-result-2026.json.gz || true

          echo "===== PROGRESS FILE ====="
          cat progress.txt || echo "Progress file not found"

      - name: Cleanup JSON
        if: always()
        run: rm -f bseb-12th-full-result-2026.json

      - name: Commit and Push Results
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add bseb-12th-full-result-2026.json.gz progress.txt
          git commit -m "Update BSEB full result data" || echo "No changes to commit"
          git pull --rebase origin main || true
          git push

      - name: Upload Result Files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bseb-full-result-data
          path: |
            bseb-12th-full-result-2026.json.gz
            progress.txt
