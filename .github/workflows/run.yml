name: One Student Check

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-one:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install axios cheerio

      - name: Run one student check
        run: node script.js

      
