name: BSEB 12th Full Result Remaining

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          lfs: false
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install axios cheerio

      - name: Show Initial Files
        run: |
          echo "===== INITIAL FILES ====="
          ls -lah

      - name: Ensure Required Files Exist
        run: |
          [ -f bseb-12th-seen-rollnos.txt ] || touch bseb-12th-seen-rollnos.txt
          [ -f bseb-12th-full-result-2026-2.ndjson ] || touch bseb-12th-full-result-2026-2.ndjson

      - name: Show Seen IDs Status
        run: |
          echo "===== SEEN IDS FILE ====="
          ls -lh bseb-12th-seen-rollnos.txt || true
          du -h bseb-12th-seen-rollnos.txt || true
          wc -l bseb-12th-seen-rollnos.txt || true

      - name: Show Current File2 Status
        run: |
          echo "===== CURRENT FILE2 NDJSON ====="
          ls -lh bseb-12th-full-result-2026-2.ndjson || true
          du -h bseb-12th-full-result-2026-2.ndjson || true
          wc -l bseb-12th-full-result-2026-2.ndjson || true

      - name: Run 12th Remaining Scraper
        run: node script.js

      - name: Validate Current NDJSON
        if: always()
        run: |
          node - <<'EOF'
          const fs = require("fs");

          const file = "bseb-12th-full-result-2026-2.ndjson";

          if (!fs.existsSync(file)) {
            console.log("⚠️ NDJSON file missing");
            process.exit(0);
          }

          const lines = fs.readFileSync(file, "utf8").split(/\r?\n/).filter(Boolean);

          console.log("✅ NDJSON exists");
          console.log("📚 Total students in file2:", lines.length);

          if (lines.length) {
            try {
              const first = JSON.parse(lines[0]);
              console.log("✅ First line valid JSON");
              console.log("👤 First Student:", first.studentName || "N/A");
            } catch (e) {
              console.error("❌ Invalid NDJSON line:", e.message);
              process.exit(1);
            }
          }
          EOF

      - name: Validate GZ
        if: always()
        run: |
          node - <<'EOF'
          const fs = require("fs");
          const zlib = require("zlib");

          const gzFile = "bseb-12th-full-result-2026-2.json.gz";

          if (!fs.existsSync(gzFile)) {
            console.log("⚠️ GZ file not found");
            process.exit(0);
          }

          const raw = fs.readFileSync(gzFile);
          const text = zlib.gunzipSync(raw).toString("utf8");
          const lines = text.split(/\r?\n/).filter(Boolean);

          console.log("✅ GZ valid");
          console.log("📚 GZ students:", lines.length);
          EOF

      - name: Show Final Files
        if: always()
        run: |
          echo "===== FINAL FILES ====="
          ls -lah

          echo "===== MASTER FILE ====="
          ls -lh bseb-12th-full-result-2026.json.gz || true
          du -h bseb-12th-full-result-2026.json.gz || true

          echo "===== FILE2 GZ ====="
          ls -lh bseb-12th-full-result-2026-2.json.gz || true
          du -h bseb-12th-full-result-2026-2.json.gz || true

          echo "===== FILE2 NDJSON ====="
          ls -lh bseb-12th-full-result-2026-2.ndjson || true
          du -h bseb-12th-full-result-2026-2.ndjson || true

          echo "===== SEEN IDS ====="
          ls -lh bseb-12th-seen-rollnos.txt || true
          du -h bseb-12th-seen-rollnos.txt || true
          wc -l bseb-12th-seen-rollnos.txt || true

      - name: Commit and Push
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # clean junk
          rm -rf node_modules || true
          git restore package.json package-lock.json || true

          # IMPORTANT: fetch latest first BEFORE committing
          git fetch origin main
          git checkout main
          git pull --rebase origin main || true

          # add only required files
          [ -f bseb-12th-full-result-2026-2.json.gz ] && git add bseb-12th-full-result-2026-2.json.gz
          [ -f bseb-12th-full-result-2026-2.ndjson ] && git add bseb-12th-full-result-2026-2.ndjson
          [ -f bseb-12th-seen-rollnos.txt ] && git add bseb-12th-seen-rollnos.txt
          [ -f script.js ] && git add script.js
          [ -f .github/workflows/recheck.yml ] && git add .github/workflows/recheck.yml

          git status

          git commit -m "Update BSEB 12th remaining result 2026" || echo "No changes to commit"

          git push origin main

      - name: Upload Backup Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bseb-12th-remaining-backup
          path: |
            bseb-12th-full-result-2026-2.json.gz
            bseb-12th-full-result-2026-2.ndjson
            bseb-12th-seen-rollnos.txt
