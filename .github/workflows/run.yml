name: BSEB Valid Roll Code Finder

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run Script
        run: node script.js

      - name: Show Saved Files
        run: |
          echo "===== FILE LIST ====="
          ls -la
          echo "===== JSON FILE ====="
          cat bseb-12th-college-list-2026.json || echo "JSON file not found"
          echo "===== PROGRESS FILE ====="
          cat progress.txt || echo "Progress file not found"

      - name: Commit and Push Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add bseb-12th-college-list-2026.json progress.txt
          git commit -m "Update valid roll code data" || echo "No changes to commit"
          git push

      - name: Upload Result Files
        uses: actions/upload-artifact@v4
        with:
          name: bseb-valid-roll-codes
          path: |
            bseb-12th-college-list-2026.json
            progress.txt
