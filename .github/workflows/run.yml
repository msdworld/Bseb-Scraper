name: BSEB Recheck Missing Students

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          lfs: true
          persist-credentials: true

      - name: Pull Git LFS files
        run: |
          git lfs install
          git lfs pull

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run Script
        run: node script.js

      - name: Show Saved Files
        if: always()
        run: |
          echo "===== ROOT FILES ====="
          ls -lah
          echo ""
          echo "===== JSON FILE SIZE ====="
          du -h bseb-12th-full-result-2026.json || echo "JSON file not found"
          echo ""
          echo "===== PROGRESS FILE ====="
          cat progress.txt || echo "Progress file not found"

      - name: Commit and Push Results
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add bseb-12th-full-result-2026.json progress.txt package-lock.json
          git commit -m "Recheck missing BSEB students" || echo "No changes to commit"

          git pull --rebase origin main || true
          git push

      - name: Upload Result Files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bseb-recheck-output
          path: |
            bseb-12th-full-result-2026.json
            progress.txt
