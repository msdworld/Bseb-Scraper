name: Debug One Student (InterBiharBoard)

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Show files before run
        run: ls -la

      - name: Run debug script
        run: node script.js

      - name: Preview debug-form.html
        if: always()
        run: |
          if [ -f debug-form.html ]; then
            echo "===== debug-form.html (first 150 lines) ====="
            head -n 150 debug-form.html
          else
            echo "debug-form.html not found"
          fi

      - name: Preview debug-result.html
        if: always()
        run: |
          if [ -f debug-result.html ]; then
            echo "===== debug-result.html (first 150 lines) ====="
            head -n 150 debug-result.html
          else
            echo "debug-result.html not found"
          fi

      - name: Upload debug HTML files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-html-files
          path: |
            debug-form.html
            debug-result.html
          if-no-files-found: warn

      - name: Upload all debug text/json/log files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-extra-files
          path: |
            *.txt
            *.json
            *.log
          if-no-files-found: ignore
